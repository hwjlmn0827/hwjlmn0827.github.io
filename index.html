<script>
// ═══════════════════════════════════════════════════════
//  Data
// ═══════════════════════════════════════════════════════
const DATA={"categories": ["哈希", "双指针", "滑动窗口", "子串", "普通数组", "矩阵", "链表", "二叉树", "图论", "回溯", "二分查找", "栈", "堆", "贪心", "动态规划", "多维动态规划", "技巧"], "problems": [{"id": 1, "title": "两数之和", "difficulty": "简单", "category": "哈希", "tags": "哈希表 数组", "link": "https://leetcode.cn/problems/two-sum/", "hint": "能否用一个哈希表在遍历的同时查找 target - nums[i] 是否已经出现过？", "solution_name": "哈希表一次遍历", "time_complexity": "O(n)", "space_complexity": "O(n)", "solution": "核心思路：遍历数组，对于每个元素 nums[i]，计算 complement = target - nums[i]。\n如果 complement 已经在哈希表中，说明找到了答案；否则把 nums[i] 存入哈希表。\n这样只需一次遍历即可完成，避免了暴力双重循环。", "code": "def twoSum(nums, target):\n    hashmap = {}\n    for i, num in enumerate(nums):\n        complement = target - num\n        if complement in hashmap:\n            return [hashmap[complement], i]\n        hashmap[num] = i\n    return []"}, {"id": 49, "title": "字母异位词分组", "difficulty": "中等", "category": "哈希", "tags": "哈希表 字符串 排序", "link": "https://leetcode.cn/problems/group-anagrams/", "hint": "异位词排序后是相同的字符串，能否用排序后的字符串作为哈希表的 key？", "solution_name": "排序 + 哈希分组", "time_complexity": "O(n * k * log(k))，k 为字符串最大长度", "space_complexity": "O(n * k)", "solution": "将每个字符串排序后作为 key，相同 key 的字符串就是一组异位词。\n用 defaultdict(list) 收集同组的字符串，最后返回所有 values。", "code": "from collections import defaultdict\n\ndef groupAnagrams(strs):\n    groups = defaultdict(list)\n    for s in strs:\n        key = ''.join(sorted(s))\n        groups[key].append(s)\n    return list(groups.values())"}, {"id": 128, "title": "最长连续序列", "difficulty": "中等", "category": "哈希", "tags": "哈希表 并查集", "link": "https://leetcode.cn/problems/longest-consecutive-sequence/", "hint": "把所有数放入 set，对于每个数 x，如果 x-1 不在 set 中，说明 x 是某个连续序列的起点。", "solution_name": "哈希集合", "time_complexity": "O(n)", "space_complexity": "O(n)", "solution": "先将所有数字放入 HashSet。遍历每个数字 x，如果 x-1 不在集合中，\n说明 x 是一个连续序列的起点，从 x 开始不断检查 x+1, x+2... 是否在集合中，\n记录最长长度。因为每个数字最多被访问两次，总时间复杂度 O(n)。", "code": "def longestConsecutive(nums):\n    num_set = set(nums)\n    longest = 0\n    for num in num_set:\n        if num - 1 not in num_set:  # 只从起点开始\n            current = num\n            length = 1\n            while current + 1 in num_set:\n                current += 1\n                length += 1\n            longest = max(longest, length)\n    return longest"}, {"id": 283, "title": "移动零", "difficulty": "简单", "category": "双指针", "tags": "双指针 数组", "link": "https://leetcode.cn/problems/move-zeroes/", "hint": "用一个慢指针记录下一个非零元素应该放的位置，快指针遍历数组。", "solution_name": "快慢双指针", "time_complexity": "O(n)", "space_complexity": "O(1)", "solution": "使用快慢指针：slow 指向下一个非零元素应放的位置，fast 遍历数组。\n当 fast 遇到非零元素时，与 slow 位置交换，slow 前进。\n这样所有非零元素被移到前面，零自然被移到后面。", "code": "def moveZeroes(nums):\n    slow = 0\n    for fast in range(len(nums)):\n        if nums[fast] != 0:\n            nums[slow], nums[fast] = nums[fast], nums[slow]\n            slow += 1"}, {"id": 11, "title": "盛最多水的容器", "difficulty": "中等", "category": "双指针", "tags": "双指针 贪心", "link": "https://leetcode.cn/problems/container-with-most-water/", "hint": "左右两个指针从两端向中间收缩，每次移动较矮的那一边。为什么这样是对的？", "solution_name": "左右双指针", "time_complexity": "O(n)", "space_complexity": "O(1)", "solution": "左指针 l=0，右指针 r=n-1。面积 = min(height[l], height[r]) * (r-l)。\n每次移动较矮的指针，因为移动较高的指针不可能得到更大面积\n（宽度减小，高度受限于较矮的一边）。", "code": "def maxArea(height):\n    l, r = 0, len(height) - 1\n    max_area = 0\n    while l < r:\n        area = min(height[l], height[r]) * (r - l)\n        max_area = max(max_area, area)\n        if height[l] < height[r]:\n            l += 1\n        else:\n            r -= 1\n    return max_area"}, {"id": 15, "title": "三数之和", "difficulty": "中等", "category": "双指针", "tags": "双指针 排序 数组", "link": "https://leetcode.cn/problems/3sum/", "hint": "先排序，固定一个数，然后用双指针在剩余部分找两数之和。注意去重。", "solution_name": "排序 + 双指针", "time_complexity": "O(n²)", "space_complexity": "O(1)（不计输出）", "solution": "先排序数组。遍历 i，对于每个 nums[i]，用双指针 l=i+1, r=n-1 找 nums[l]+nums[r] == -nums[i]。\n去重：如果 nums[i] == nums[i-1] 则跳过；找到答案后 l 和 r 也要跳过重复值。", "code": "def threeSum(nums):\n    nums.sort()\n    result = []\n    for i in range(len(nums) - 2):\n        if i > 0 and nums[i] == nums[i-1]:\n            continue\n        l, r = i + 1, len(nums) - 1\n        while l < r:\n            s = nums[i] + nums[l] + nums[r]\n            if s < 0:\n                l += 1\n            elif s > 0:\n                r -= 1\n            else:\n                result.append([nums[i], nums[l], nums[r]])\n                while l < r and nums[l] == nums[l+1]: l += 1\n                while l < r and nums[r] == nums[r-1]: r -= 1\n                l += 1; r -= 1\n    return result"}, {"id": 42, "title": "接雨水", "difficulty": "困难", "category": "双指针", "tags": "双指针 动态规划 单调栈", "link": "https://leetcode.cn/problems/trapping-rain-water/", "hint": "每个位置能接的雨水 = min(左边最高, 右边最高) - 当前高度。能否用双指针一次遍历？", "solution_name": "左右双指针", "time_complexity": "O(n)", "space_complexity": "O(1)", "solution": "维护 left_max 和 right_max。左指针 l=0，右指针 r=n-1。\n如果 height[l] < height[r]，处理左边：若 height[l] >= left_max 则更新 left_max，\n否则累加 left_max - height[l]；反之处理右边。\n关键洞察：较矮一侧的水量只取决于该侧的最大值。", "code": "def trap(height):\n    l, r = 0, len(height) - 1\n    left_max = right_max = 0\n    water = 0\n    while l < r:\n        if height[l] < height[r]:\n            if height[l] >= left_max:\n                left_max = height[l]\n            else:\n                water += left_max - height[l]\n            l += 1\n        else:\n            if height[r] >= right_max:\n                right_max = height[r]\n            else:\n                water += right_max - height[r]\n            r -= 1\n    return water"}, {"id": 3, "title": "无重复字符的最长子串", "difficulty": "中等", "category": "滑动窗口", "tags": "滑动窗口 哈希表 字符串", "link": "https://leetcode.cn/problems/longest-substring-without-repeating-characters/", "hint": "维护一个窗口 [left, right]，用 set 记录窗口内字符。遇到重复字符时收缩左边界。", "solution_name": "滑动窗口 + 哈希集合", "time_complexity": "O(n)", "space_complexity": "O(min(n, m))，m 为字符集大小", "solution": "用 left 和 right 维护一个滑动窗口，用 set 记录窗口内的字符。\nright 右移扩大窗口，如果新字符已在 set 中，则不断移动 left 缩小窗口直到没有重复。\n每次更新最大长度 = right - left + 1。", "code": "def lengthOfLongestSubstring(s):\n    char_set = set()\n    left = 0\n    max_len = 0\n    for right in range(len(s)):\n        while s[right] in char_set:\n            char_set.remove(s[left])\n            left += 1\n        char_set.add(s[right])\n        max_len = max(max_len, right - left + 1)\n    return max_len"}, {"id": 438, "title": "找到字符串中所有字母异位词", "difficulty": "中等", "category": "滑动窗口", "tags": "滑动窗口 哈希表 字符串", "link": "https://leetcode.cn/problems/find-all-anagrams-in-a-string/", "hint": "固定窗口大小为 len(p)，滑动窗口并比较窗口内字符频次与 p 的字符频次。", "solution_name": "固定大小滑动窗口", "time_complexity": "O(n)", "space_complexity": "O(1)（字符集固定 26）", "solution": "维护一个大小为 len(p) 的滑动窗口。用两个计数器分别记录 p 和窗口内的字符频次。\n窗口每滑动一步，加入右边字符、移除左边字符，然后比较两个计数器是否相等。\n优化：维护一个 match 变量记录匹配的字符种类数，避免每次比较整个计数器。", "code": "from collections import Counter\n\ndef findAnagrams(s, p):\n    if len(s) < len(p):\n        return []\n    p_count = Counter(p)\n    s_count = Counter(s[:len(p)])\n    result = []\n    if s_count == p_count:\n        result.append(0)\n    for i in range(len(p), len(s)):\n        s_count[s[i]] += 1\n        left_char = s[i - len(p)]\n        s_count[left_char] -= 1\n        if s_count[left_char] == 0:\n            del s_count[left_char]\n        if s_count == p_count:\n            result.append(i - len(p) + 1)\n    return result"}, {"id": 560, "title": "和为 K 的子数组", "difficulty": "中等", "category": "子串", "tags": "前缀和 哈希表", "link": "https://leetcode.cn/problems/subarray-sum-equals-k/", "hint": "前缀和 prefix[j] - prefix[i] = k，即 prefix[i] = prefix[j] - k。用哈希表记录前缀和出现次数。", "solution_name": "前缀和 + 哈希表", "time_complexity": "O(n)", "space_complexity": "O(n)", "solution": "维护前缀和 prefix_sum，用哈希表记录每个前缀和出现的次数。\n遍历时，如果 prefix_sum - k 在哈希表中，说明存在子数组和为 k，\n累加对应的次数。初始时哈希表中 {0: 1} 表示前缀和为 0 出现 1 次。", "code": "from collections import defaultdict\n\ndef subarraySum(nums, k):\n    count = 0\n    prefix_sum = 0\n    prefix_map = defaultdict(int)\n    prefix_map[0] = 1\n    for num in nums:\n        prefix_sum += num\n        count += prefix_map[prefix_sum - k]\n        prefix_map[prefix_sum] += 1\n    return count"}, {"id": 239, "title": "滑动窗口最大值", "difficulty": "困难", "category": "子串", "tags": "单调队列 滑动窗口", "link": "https://leetcode.cn/problems/sliding-window-maximum/", "hint": "用一个单调递减的双端队列，队首始终是当前窗口的最大值。", "solution_name": "单调双端队列", "time_complexity": "O(n)", "space_complexity": "O(k)", "solution": "维护一个单调递减的双端队列 deque，存储元素下标。\n遍历数组时：1) 移除队首超出窗口范围的元素；\n2) 从队尾移除所有小于当前元素的下标（它们不可能成为最大值）；\n3) 将当前下标加入队尾；4) 当窗口形成后，队首即为最大值。", "code": "from collections import deque\n\ndef maxSlidingWindow(nums, k):\n    dq = deque()  # 存下标\n    result = []\n    for i in range(len(nums)):\n        while dq and dq[0] < i - k + 1:\n            dq.popleft()\n        while dq and nums[dq[-1]] < nums[i]:\n            dq.pop()\n        dq.append(i)\n        if i >= k - 1:\n            result.append(nums[dq[0]])\n    return result"}, {"id": 76, "title": "最小覆盖子串", "difficulty": "困难", "category": "子串", "tags": "滑动窗口 哈希表 字符串", "link": "https://leetcode.cn/problems/minimum-window-substring/", "hint": "滑动窗口：右指针扩大窗口直到包含 t 的所有字符，然后左指针收缩窗口寻找最小解。", "solution_name": "滑动窗口", "time_complexity": "O(n)", "space_complexity": "O(|字符集|)", "solution": "用 need 记录 t 中每个字符的需求量，用 missing 记录还缺多少个字符。\n右指针扩大窗口，每加入一个字符就更新 need 和 missing。\n当 missing == 0 时，左指针收缩窗口，更新最小覆盖子串，直到窗口不再满足条件。", "code": "from collections import Counter\n\ndef minWindow(s, t):\n    need = Counter(t)\n    missing = len(t)\n    left = 0\n    start, end = 0, float('inf')\n    for right, char in enumerate(s):\n        if need[char] > 0:\n            missing -= 1\n        need[char] -= 1\n        while missing == 0:\n            if right - left < end - start:\n                start, end = left, right\n            need[s[left]] += 1\n            if need[s[left]] > 0:\n                missing += 1\n            left += 1\n    return '' if end == float('inf') else s[start:end+1]"}, {"id": 53, "title": "最大子数组和", "difficulty": "中等", "category": "普通数组", "tags": "动态规划 分治 数组", "link": "https://leetcode.cn/problems/maximum-subarray/", "hint": "Kadane 算法：如果前面的子数组和为负数，不如从当前元素重新开始。", "solution_name": "Kadane 算法", "time_complexity": "O(n)", "space_complexity": "O(1)", "solution": "维护 current_sum 表示以当前元素结尾的最大子数组和。\n对于每个元素，current_sum = max(num, current_sum + num)。\n如果 current_sum 变成负数，说明前面的累加是负担，不如从当前元素重新开始。\n全局维护 max_sum 记录最大值。", "code": "def maxSubArray(nums):\n    current_sum = max_sum = nums[0]\n    for num in nums[1:]:\n        current_sum = max(num, current_sum + num)\n        max_sum = max(max_sum, current_sum)\n    return max_sum"}, {"id": 56, "title": "合并区间", "difficulty": "中等", "category": "普通数组", "tags": "排序 数组", "link": "https://leetcode.cn/problems/merge-intervals/", "hint": "按区间起点排序后，依次检查当前区间是否与上一个区间重叠。", "solution_name": "排序 + 一次遍历", "time_complexity": "O(n log n)", "space_complexity": "O(n)", "solution": "先按区间起点排序。维护一个结果列表，遍历每个区间：\n如果当前区间的起点 <= 结果列表最后一个区间的终点，说明重叠，合并（更新终点）；\n否则直接加入结果列表。", "code": "def merge(intervals):\n    intervals.sort(key=lambda x: x[0])\n    merged = []\n    for interval in intervals:\n        if merged and interval[0] <= merged[-1][1]:\n            merged[-1][1] = max(merged[-1][1], interval[1])\n        else:\n            merged.append(interval[:])\n    return merged"}, {"id": 189, "title": "轮转数组", "difficulty": "中等", "category": "普通数组", "tags": "数组 数学", "link": "https://leetcode.cn/problems/rotate-array/", "hint": "三次翻转：先整体翻转，再翻转前 k 个，再翻转后 n-k 个。", "solution_name": "三次翻转", "time_complexity": "O(n)", "space_complexity": "O(1)", "solution": "将数组右移 k 位等价于：\n1) 翻转整个数组 [1,2,3,4,5,6,7] → [7,6,5,4,3,2,1]\n2) 翻转前 k 个 → [5,6,7,4,3,2,1]\n3) 翻转后 n-k 个 → [5,6,7,1,2,3,4]\n注意 k 要对 n 取模。", "code": "def rotate(nums, k):\n    n = len(nums)\n    k %= n\n    def reverse(l, r):\n        while l < r:\n            nums[l], nums[r] = nums[r], nums[l]\n            l += 1; r -= 1\n    reverse(0, n - 1)\n    reverse(0, k - 1)\n    reverse(k, n - 1)"}, {"id": 238, "title": "除自身以外数组的乘积", "difficulty": "中等", "category": "普通数组", "tags": "数组 前缀积", "link": "https://leetcode.cn/problems/product-of-array-except-self/", "hint": "answer[i] = 左边所有元素的乘积 × 右边所有元素的乘积。能否用两次遍历完成？", "solution_name": "前缀积 + 后缀积", "time_complexity": "O(n)", "space_complexity": "O(1)（不计输出数组）", "solution": "第一次从左到右遍历，answer[i] 存储 i 左边所有元素的乘积。\n第二次从右到左遍历，用一个变量 right 累积右边的乘积，answer[i] *= right。\n这样不需要额外数组，空间复杂度 O(1)。", "code": "def productExceptSelf(nums):\n    n = len(nums)\n    answer = [1] * n\n    # 左边乘积\n    left = 1\n    for i in range(n):\n        answer[i] = left\n        left *= nums[i]\n    # 右边乘积\n    right = 1\n    for i in range(n - 1, -1, -1):\n        answer[i] *= right\n        right *= nums[i]\n    return answer"}, {"id": 41, "title": "缺失的第一个正数", "difficulty": "困难", "category": "普通数组", "tags": "数组 哈希表", "link": "https://leetcode.cn/problems/first-missing-positive/", "hint": "原地哈希：把每个数 x 放到下标 x-1 的位置上，然后扫描找第一个 nums[i] != i+1 的位置。", "solution_name": "原地哈希（置换法）", "time_complexity": "O(n)", "space_complexity": "O(1)", "solution": "答案一定在 [1, n+1] 范围内。将数组本身当作哈希表：\n对于每个 nums[i]，如果 1 <= nums[i] <= n，就把它交换到 nums[nums[i]-1] 的位置。\n交换后继续检查当前位置，直到无法交换。\n最后遍历数组，第一个 nums[i] != i+1 的 i+1 就是答案。", "code": "def firstMissingPositive(nums):\n    n = len(nums)\n    for i in range(n):\n        while 1 <= nums[i] <= n and nums[nums[i]-1] != nums[i]:\n            nums[nums[i]-1], nums[i] = nums[i], nums[nums[i]-1]\n    for i in range(n):\n        if nums[i] != i + 1:\n            return i + 1\n    return n + 1"}, {"id": 73, "title": "矩阵置零", "difficulty": "中等", "category": "矩阵", "tags": "矩阵 数组", "link": "https://leetcode.cn/problems/set-matrix-zeroes/", "hint": "用矩阵的第一行和第一列作为标记，记录哪些行和列需要置零。", "solution_name": "原地标记法", "time_complexity": "O(m × n)", "space_complexity": "O(1)", "solution": "用第一行和第一列作为标记数组。先用两个变量记录第一行和第一列本身是否有零。\n然后遍历矩阵，如果 matrix[i][j] == 0，就标记 matrix[i][0] = 0 和 matrix[0][j] = 0。\n再根据标记将对应行列置零。最后处理第一行和第一列。", "code": "def setZeroes(matrix):\n    m, n = len(matrix), len(matrix[0])\n    first_row_zero = any(matrix[0][j] == 0 for j in range(n))\n    first_col_zero = any(matrix[i][0] == 0 for i in range(m))\n    for i in range(1, m):\n        for j in range(1, n):\n            if matrix[i][j] == 0:\n                matrix[i][0] = 0\n                matrix[0][j] = 0\n    for i in range(1, m):\n        for j in range(1, n):\n            if matrix[i][0] == 0 or matrix[0][j] == 0:\n                matrix[i][j] = 0\n    if first_row_zero:\n        for j in range(n): matrix[0][j] = 0\n    if first_col_zero:\n        for i in range(m): matrix[i][0] = 0"}, {"id": 54, "title": "螺旋矩阵", "difficulty": "中等", "category": "矩阵", "tags": "矩阵 模拟", "link": "https://leetcode.cn/problems/spiral-matrix/", "hint": "维护上下左右四个边界，按 右→下→左→上 的顺序螺旋遍历，每走完一边收缩对应边界。", "solution_name": "边界收缩法", "time_complexity": "O(m × n)", "space_complexity": "O(1)（不计输出）", "solution": "定义四个边界 top, bottom, left, right。\n按顺序遍历：从左到右（top 行）→ 从上到下（right 列）→ 从右到左（bottom 行）→ 从下到上（left 列）。\n每遍历完一边就收缩对应边界，直到边界交叉。", "code": "def spiralOrder(matrix):\n    result = []\n    top, bottom = 0, len(matrix) - 1\n    left, right = 0, len(matrix[0]) - 1\n    while top <= bottom and left <= right:\n        for j in range(left, right + 1):\n            result.append(matrix[top][j])\n        top += 1\n        for i in range(top, bottom + 1):\n            result.append(matrix[i][right])\n        right -= 1\n        if top <= bottom:\n            for j in range(right, left - 1, -1):\n                result.append(matrix[bottom][j])\n            bottom -= 1\n        if left <= right:\n            for i in range(bottom, top - 1, -1):\n                result.append(matrix[i][left])\n            left += 1\n    return result"}, {"id": 48, "title": "旋转图像", "difficulty": "中等", "category": "矩阵", "tags": "矩阵 数学", "link": "https://leetcode.cn/problems/rotate-image/", "hint": "顺时针旋转 90° = 先沿对角线转置，再左右翻转每一行。", "solution_name": "转置 + 翻转", "time_complexity": "O(n²)", "space_complexity": "O(1)", "solution": "顺时针旋转 90° 可以分解为两步：\n1) 沿主对角线转置：swap(matrix[i][j], matrix[j][i])\n2) 每行左右翻转：reverse(matrix[i])\n这样就完成了原地旋转。", "code": "def rotate(matrix):\n    n = len(matrix)\n    # 转置\n    for i in range(n):\n        for j in range(i + 1, n):\n            matrix[i][j], matrix[j][i] = matrix[j][i], matrix[i][j]\n    # 翻转每行\n    for row in matrix:\n        row.reverse()"}, {"id": 240, "title": "搜索二维矩阵 II", "difficulty": "中等", "category": "矩阵", "tags": "矩阵 二分查找 分治", "link": "https://leetcode.cn/problems/search-a-2d-matrix-ii/", "hint": "从右上角出发：如果当前值大于 target 则左移，小于 target 则下移。", "solution_name": "右上角搜索（Z 字形查找）", "time_complexity": "O(m + n)", "space_complexity": "O(1)", "solution": "从矩阵右上角 (0, n-1) 开始：\n如果当前值 == target，返回 True；\n如果当前值 > target，说明这一列都大于 target，左移（col--）；\n如果当前值 < target，说明这一行都小于 target，下移（row++）。\n每步排除一行或一列，最多走 m+n 步。", "code": "def searchMatrix(matrix, target):\n    if not matrix:\n        return False\n    row, col = 0, len(matrix[0]) - 1\n    while row < len(matrix) and col >= 0:\n        if matrix[row][col] == target:\n            return True\n        elif matrix[row][col] > target:\n            col -= 1\n        else:\n            row += 1\n    return False"}, {"id": 160, "title": "相交链表", "difficulty": "简单", "category": "链表", "tags": "链表 双指针", "link": "https://leetcode.cn/problems/intersection-of-two-linked-lists/", "hint": "两个指针分别从 A 和 B 出发，走到末尾后跳到另一个链表头部，最终会在交点相遇。", "solution_name": "双指针（浪漫相遇法）", "time_complexity": "O(m + n)", "space_complexity": "O(1)", "solution": "指针 pA 从 headA 出发，pB 从 headB 出发。\npA 走到末尾后跳到 headB 继续走，pB 走到末尾后跳到 headA 继续走。\n如果有交点，两个指针走过的总路程相同（a + c + b == b + c + a），会在交点相遇。\n如果没有交点，两个指针最终都会走到 None。", "code": "def getIntersectionNode(headA, headB):\n    pA, pB = headA, headB\n    while pA != pB:\n        pA = pA.next if pA else headB\n        pB = pB.next if pB else headA\n    return pA"}, {"id": 206, "title": "反转链表", "difficulty": "简单", "category": "链表", "tags": "链表 递归", "link": "https://leetcode.cn/problems/reverse-linked-list/", "hint": "用三个指针 prev, curr, next 逐个翻转指向。", "solution_name": "迭代法", "time_complexity": "O(n)", "space_complexity": "O(1)", "solution": "维护 prev=None, curr=head。每次保存 curr.next，\n然后将 curr.next 指向 prev，prev 和 curr 各前进一步。\n循环结束后 prev 就是新的头节点。", "code": "def reverseList(head):\n    prev, curr = None, head\n    while curr:\n        next_node = curr.next\n        curr.next = prev\n        prev = curr\n        curr = next_node\n    return prev"}, {"id": 234, "title": "回文链表", "difficulty": "简单", "category": "链表", "tags": "链表 双指针 栈", "link": "https://leetcode.cn/problems/palindrome-linked-list/", "hint": "快慢指针找中点，反转后半部分，然后逐一比较。", "solution_name": "快慢指针 + 反转后半段", "time_complexity": "O(n)", "space_complexity": "O(1)", "solution": "1) 快慢指针找到链表中点（slow 到中间，fast 到末尾）。\n2) 反转后半部分链表。\n3) 从头和从中间同时遍历比较，全部相等则是回文。\n4)（可选）恢复链表结构。", "code": "def isPalindrome(head):\n    # 找中点\n    slow = fast = head\n    while fast and fast.next:\n        slow = slow.next\n        fast = fast.next.next\n    # 反转后半段\n    prev = None\n    while slow:\n        nxt = slow.next\n        slow.next = prev\n        prev = slow\n        slow = nxt\n    # 比较\n    left, right = head, prev\n    while right:\n        if left.val != right.val:\n            return False\n        left = left.next\n        right = right.next\n    return True"}, {"id": 141, "title": "环形链表", "difficulty": "简单", "category": "链表", "tags": "链表 双指针", "link": "https://leetcode.cn/problems/linked-list-cycle/", "hint": "快慢指针：快指针每次走两步，慢指针每次走一步，如果有环一定会相遇。", "solution_name": "快慢指针（Floyd 判圈）", "time_complexity": "O(n)", "space_complexity": "O(1)", "solution": "slow 每次走一步，fast 每次走两步。\n如果链表有环，fast 最终会追上 slow（在环内相遇）。\n如果 fast 走到 None，说明没有环。", "code": "def hasCycle(head):\n    slow = fast = head\n    while fast and fast.next:\n        slow = slow.next\n        fast = fast.next.next\n        if slow == fast:\n            return True\n    return False"}, {"id": 142, "title": "环形链表 II", "difficulty": "中等", "category": "链表", "tags": "链表 双指针", "link": "https://leetcode.cn/problems/linked-list-cycle-ii/", "hint": "先用快慢指针判断有环并找到相遇点，然后一个指针从 head 出发，一个从相遇点出发，再次相遇就是环入口。", "solution_name": "Floyd 判圈 + 找入口", "time_complexity": "O(n)", "space_complexity": "O(1)", "solution": "第一阶段：快慢指针找到环内相遇点。\n第二阶段：一个指针从 head 出发，一个从相遇点出发，都每次走一步。\n数学证明：它们会在环的入口处相遇。\n设 head 到入口距离 a，入口到相遇点 b，相遇点到入口 c，则 a = c。", "code": "def detectCycle(head):\n    slow = fast = head\n    while fast and fast.next:\n        slow = slow.next\n        fast = fast.next.next\n        if slow == fast:\n            # 找入口\n            ptr = head\n            while ptr != slow:\n                ptr = ptr.next\n                slow = slow.next\n            return ptr\n    return None"}, {"id": 21, "title": "合并两个有序链表", "difficulty": "简单", "category": "链表", "tags": "链表 递归", "link": "https://leetcode.cn/problems/merge-two-sorted-lists/", "hint": "用一个哨兵节点，每次比较两个链表头部，把较小的接上去。", "solution_name": "迭代法（哨兵节点）", "time_complexity": "O(m + n)", "space_complexity": "O(1)", "solution": "创建哨兵节点 dummy，用 curr 指针构建结果链表。\n每次比较 l1 和 l2 的头节点，把较小的接到 curr 后面。\n当一个链表遍历完后，把另一个链表剩余部分直接接上。", "code": "def mergeTwoLists(l1, l2):\n    dummy = ListNode(0)\n    curr = dummy\n    while l1 and l2:\n        if l1.val <= l2.val:\n            curr.next = l1\n            l1 = l1.next\n        else:\n            curr.next = l2\n            l2 = l2.next\n        curr = curr.next\n    curr.next = l1 if l1 else l2\n    return dummy.next"}, {"id": 2, "title": "两数相加", "difficulty": "中等", "category": "链表", "tags": "链表 数学", "link": "https://leetcode.cn/problems/add-two-numbers/", "hint": "模拟加法：逐位相加，注意进位。", "solution_name": "模拟加法", "time_complexity": "O(max(m, n))", "space_complexity": "O(max(m, n))", "solution": "同时遍历两个链表，逐位相加并处理进位 carry。\n每一位的值 = (l1.val + l2.val + carry) % 10，进位 = // 10。\n遍历结束后如果还有进位，再加一个节点。", "code": "def addTwoNumbers(l1, l2):\n    dummy = ListNode(0)\n    curr = dummy\n    carry = 0\n    while l1 or l2 or carry:\n        val = carry\n        if l1:\n            val += l1.val\n            l1 = l1.next\n        if l2:\n            val += l2.val\n            l2 = l2.next\n        carry, val = divmod(val, 10)\n        curr.next = ListNode(val)\n        curr = curr.next\n    return dummy.next"}, {"id": 19, "title": "删除链表的倒数第 N 个结点", "difficulty": "中等", "category": "链表", "tags": "链表 双指针", "link": "https://leetcode.cn/problems/remove-nth-node-from-end-of-list/", "hint": "快指针先走 n 步，然后快慢指针一起走，快指针到末尾时慢指针就在倒数第 n+1 个位置。", "solution_name": "快慢指针", "time_complexity": "O(n)", "space_complexity": "O(1)", "solution": "用哨兵节点处理删除头节点的边界情况。\nfast 先走 n+1 步，然后 fast 和 slow 一起走。\n当 fast 到达末尾（None）时，slow.next 就是要删除的节点。", "code": "def removeNthFromEnd(head, n):\n    dummy = ListNode(0, head)\n    fast = slow = dummy\n    for _ in range(n + 1):\n        fast = fast.next\n    while fast:\n        fast = fast.next\n        slow = slow.next\n    slow.next = slow.next.next\n    return dummy.next"}, {"id": 24, "title": "两两交换链表中的节点", "difficulty": "中等", "category": "链表", "tags": "链表 递归", "link": "https://leetcode.cn/problems/swap-nodes-in-pairs/", "hint": "每次处理两个节点的交换，注意维护前驱指针。", "solution_name": "迭代法", "time_complexity": "O(n)", "space_complexity": "O(1)", "solution": "用哨兵节点 dummy，prev 指向待交换的两个节点之前。\n每次交换 prev.next 和 prev.next.next，然后 prev 前进两步。\n交换过程：保存 first=prev.next, second=first.next，\n然后 prev.next=second, first.next=second.next, second.next=first。", "code": "def swapPairs(head):\n    dummy = ListNode(0, head)\n    prev = dummy\n    while prev.next and prev.next.next:\n        first = prev.next\n        second = first.next\n        prev.next = second\n        first.next = second.next\n        second.next = first\n        prev = first\n    return dummy.next"}, {"id": 25, "title": "K 个一组翻转链表", "difficulty": "困难", "category": "链表", "tags": "链表 递归", "link": "https://leetcode.cn/problems/reverse-nodes-in-k-group/", "hint": "先检查剩余节点是否够 k 个，够的话就翻转这 k 个节点，然后递归处理剩余部分。", "solution_name": "迭代分组翻转", "time_complexity": "O(n)", "space_complexity": "O(1)", "solution": "用哨兵节点。每次先检查后面是否有 k 个节点，如果有就翻转这一组。\n翻转一组的方法：在组内逐个翻转指针方向。\n翻转后更新前驱节点和后继节点的连接，然后处理下一组。", "code": "def reverseKGroup(head, k):\n    dummy = ListNode(0, head)\n    prev_group = dummy\n    while True:\n        # 检查是否有 k 个节点\n        kth = prev_group\n        for _ in range(k):\n            kth = kth.next\n            if not kth:\n                return dummy.next\n        next_group = kth.next\n        # 翻转 k 个节点\n        prev, curr = next_group, prev_group.next\n        for _ in range(k):\n            nxt = curr.next\n            curr.next = prev\n            prev = curr\n            curr = nxt\n        tmp = prev_group.next\n        prev_group.next = kth\n        prev_group = tmp"}, {"id": 138, "title": "随机链表的复制", "difficulty": "中等", "category": "链表", "tags": "链表 哈希表", "link": "https://leetcode.cn/problems/copy-list-with-random-pointer/", "hint": "用哈希表建立原节点到新节点的映射，然后设置 next 和 random 指针。", "solution_name": "哈希表映射", "time_complexity": "O(n)", "space_complexity": "O(n)", "solution": "第一遍遍历：为每个原节点创建对应的新节点，存入哈希表 {原节点: 新节点}。\n第二遍遍历：设置每个新节点的 next 和 random 指针，通过哈希表查找对应关系。", "code": "def copyRandomList(head):\n    if not head:\n        return None\n    old_to_new = {}\n    curr = head\n    while curr:\n        old_to_new[curr] = Node(curr.val)\n        curr = curr.next\n    curr = head\n    while curr:\n        old_to_new[curr].next = old_to_new.get(curr.next)\n        old_to_new[curr].random = old_to_new.get(curr.random)\n        curr = curr.next\n    return old_to_new[head]"}, {"id": 148, "title": "排序链表", "difficulty": "中等", "category": "链表", "tags": "链表 排序 归并排序", "link": "https://leetcode.cn/problems/sort-list/", "hint": "归并排序：快慢指针找中点，递归排序两半，然后合并两个有序链表。", "solution_name": "归并排序", "time_complexity": "O(n log n)", "space_complexity": "O(log n)（递归栈）", "solution": "1) 快慢指针找到链表中点，断开为两半。\n2) 递归排序左半和右半。\n3) 合并两个有序链表（同第 21 题）。\nbase case：空链表或只有一个节点直接返回。", "code": "def sortList(head):\n    if not head or not head.next:\n        return head\n    # 找中点并断开\n    slow, fast = head, head.next\n    while fast and fast.next:\n        slow = slow.next\n        fast = fast.next.next\n    mid = slow.next\n    slow.next = None\n    # 递归排序\n    left = sortList(head)\n    right = sortList(mid)\n    # 合并\n    dummy = ListNode(0)\n    curr = dummy\n    while left and right:\n        if left.val <= right.val:\n            curr.next = left\n            left = left.next\n        else:\n            curr.next = right\n            right = right.next\n        curr = curr.next\n    curr.next = left if left else right\n    return dummy.next"}, {"id": 23, "title": "合并 K 个升序链表", "difficulty": "困难", "category": "链表", "tags": "链表 堆 分治", "link": "https://leetcode.cn/problems/merge-k-sorted-lists/", "hint": "用最小堆维护 k 个链表的当前头节点，每次取最小的接到结果链表。", "solution_name": "最小堆", "time_complexity": "O(n log k)，n 为总节点数", "space_complexity": "O(k)", "solution": "将 k 个链表的头节点放入最小堆。\n每次从堆中取出最小节点接到结果链表，如果该节点有 next，将 next 放入堆。\n重复直到堆为空。", "code": "import heapq\n\ndef mergeKLists(lists):\n    heap = []\n    for i, node in enumerate(lists):\n        if node:\n            heapq.heappush(heap, (node.val, i, node))\n    dummy = ListNode(0)\n    curr = dummy\n    while heap:\n        val, i, node = heapq.heappop(heap)\n        curr.next = node\n        curr = curr.next\n        if node.next:\n            heapq.heappush(heap, (node.next.val, i, node.next))\n    return dummy.next"}, {"id": 146, "title": "LRU 缓存", "difficulty": "中等", "category": "链表", "tags": "链表 哈希表 设计", "link": "https://leetcode.cn/problems/lru-cache/", "hint": "哈希表 + 双向链表：哈希表 O(1) 查找，双向链表 O(1) 维护访问顺序。", "solution_name": "哈希表 + 双向链表", "time_complexity": "O(1)（get 和 put）", "space_complexity": "O(capacity)", "solution": "用 OrderedDict 实现（Python 内置）：\nget: 如果 key 存在，move_to_end 并返回值。\nput: 如果 key 存在，更新值并 move_to_end；否则插入，如果超容量则 popitem(last=False) 移除最久未使用的。", "code": "from collections import OrderedDict\n\nclass LRUCache:\n    def __init__(self, capacity):\n        self.cache = OrderedDict()\n        self.capacity = capacity\n\n    def get(self, key):\n        if key not in self.cache:\n            return -1\n        self.cache.move_to_end(key)\n        return self.cache[key]\n\n    def put(self, key, value):\n        if key in self.cache:\n            self.cache.move_to_end(key)\n        self.cache[key] = value\n        if len(self.cache) > self.capacity:\n            self.cache.popitem(last=False)"}, {"id": 94, "title": "二叉树的中序遍历", "difficulty": "简单", "category": "二叉树", "tags": "二叉树 栈 递归", "link": "https://leetcode.cn/problems/binary-tree-inorder-traversal/", "hint": "递归：左→根→右。迭代：用栈模拟，一路向左压栈，弹出时访问并转向右子树。", "solution_name": "迭代法（栈）", "time_complexity": "O(n)", "space_complexity": "O(n)", "solution": "用栈模拟递归。从根节点开始，一路向左走并压栈。\n当走到 None 时，弹出栈顶节点（访问它），然后转向右子树。\n重复直到栈为空且当前节点为 None。", "code": "def inorderTraversal(root):\n    result, stack = [], []\n    curr = root\n    while curr or stack:\n        while curr:\n            stack.append(curr)\n            curr = curr.left\n        curr = stack.pop()\n        result.append(curr.val)\n        curr = curr.right\n    return result"}, {"id": 104, "title": "二叉树的最大深度", "difficulty": "简单", "category": "二叉树", "tags": "二叉树 DFS BFS", "link": "https://leetcode.cn/problems/maximum-depth-of-binary-tree/", "hint": "递归：树的最大深度 = 1 + max(左子树深度, 右子树深度)。", "solution_name": "递归 DFS", "time_complexity": "O(n)", "space_complexity": "O(h)，h 为树高", "solution": "递归定义：空节点深度为 0。\n非空节点的深度 = 1 + max(左子树深度, 右子树深度)。\n这是最经典的树递归问题。", "code": "def maxDepth(root):\n    if not root:\n        return 0\n    return 1 + max(maxDepth(root.left), maxDepth(root.right))"}, {"id": 226, "title": "翻转二叉树", "difficulty": "简单", "category": "二叉树", "tags": "二叉树 DFS 递归", "link": "https://leetcode.cn/problems/invert-binary-tree/", "hint": "递归交换每个节点的左右子树。", "solution_name": "递归", "time_complexity": "O(n)", "space_complexity": "O(h)", "solution": "对于每个节点，交换它的左右子树，然后递归翻转左子树和右子树。\nbase case：空节点直接返回 None。", "code": "def invertTree(root):\n    if not root:\n        return None\n    root.left, root.right = root.right, root.left\n    invertTree(root.left)\n    invertTree(root.right)\n    return root"}, {"id": 101, "title": "对称二叉树", "difficulty": "简单", "category": "二叉树", "tags": "二叉树 DFS BFS", "link": "https://leetcode.cn/problems/symmetric-tree/", "hint": "递归比较：左子树的左 == 右子树的右，左子树的右 == 右子树的左。", "solution_name": "递归对比", "time_complexity": "O(n)", "space_complexity": "O(h)", "solution": "定义辅助函数 isMirror(left, right)：\n两个都为空 → True；一个为空 → False；值不等 → False。\n递归检查 isMirror(left.left, right.right) and isMirror(left.right, right.left)。", "code": "def isSymmetric(root):\n    def isMirror(left, right):\n        if not left and not right:\n            return True\n        if not left or not right:\n            return False\n        return (left.val == right.val\n                and isMirror(left.left, right.right)\n                and isMirror(left.right, right.left))\n    return isMirror(root.left, root.right) if root else True"}, {"id": 543, "title": "二叉树的直径", "difficulty": "简单", "category": "二叉树", "tags": "二叉树 DFS", "link": "https://leetcode.cn/problems/diameter-of-binary-tree/", "hint": "直径 = 经过某个节点的 左子树深度 + 右子树深度 的最大值。", "solution_name": "DFS 求深度", "time_complexity": "O(n)", "space_complexity": "O(h)", "solution": "对每个节点，经过它的最长路径 = 左子树深度 + 右子树深度。\n在递归求深度的过程中，顺便更新全局最大直径。\n深度函数返回 1 + max(左深度, 右深度)。", "code": "def diameterOfBinaryTree(root):\n    diameter = 0\n    def depth(node):\n        nonlocal diameter\n        if not node:\n            return 0\n        left = depth(node.left)\n        right = depth(node.right)\n        diameter = max(diameter, left + right)\n        return 1 + max(left, right)\n    depth(root)\n    return diameter"}, {"id": 102, "title": "二叉树的层序遍历", "difficulty": "中等", "category": "二叉树", "tags": "二叉树 BFS 队列", "link": "https://leetcode.cn/problems/binary-tree-level-order-traversal/", "hint": "BFS：用队列逐层遍历，每层处理队列中当前所有节点。", "solution_name": "BFS 队列", "time_complexity": "O(n)", "space_complexity": "O(n)", "solution": "用队列进行 BFS。每次处理一层：记录当前队列大小 size，\n弹出 size 个节点加入当前层结果，同时将它们的子节点入队。", "code": "from collections import deque\n\ndef levelOrder(root):\n    if not root:\n        return []\n    result = []\n    queue = deque([root])\n    while queue:\n        level = []\n        for _ in range(len(queue)):\n            node = queue.popleft()\n            level.append(node.val)\n            if node.left: queue.append(node.left)\n            if node.right: queue.append(node.right)\n        result.append(level)\n    return result"}, {"id": 108, "title": "将有序数组转换为二叉搜索树", "difficulty": "简单", "category": "二叉树", "tags": "二叉树 分治 二分", "link": "https://leetcode.cn/problems/convert-sorted-array-to-binary-search-tree/", "hint": "取数组中间元素作为根，左半部分递归构建左子树，右半部分递归构建右子树。", "solution_name": "递归分治", "time_complexity": "O(n)", "space_complexity": "O(log n)", "solution": "有序数组的中间元素作为根节点，可以保证树的高度平衡。\n递归地对左半部分构建左子树，右半部分构建右子树。\nbase case：区间为空时返回 None。", "code": "def sortedArrayToBST(nums):\n    def build(left, right):\n        if left > right:\n            return None\n        mid = (left + right) // 2\n        node = TreeNode(nums[mid])\n        node.left = build(left, mid - 1)\n        node.right = build(mid + 1, right)\n        return node\n    return build(0, len(nums) - 1)"}, {"id": 98, "title": "验证二叉搜索树", "difficulty": "中等", "category": "二叉树", "tags": "二叉树 DFS 中序遍历", "link": "https://leetcode.cn/problems/validate-binary-search-tree/", "hint": "BST 的中序遍历是严格递增的。或者递归时传递上下界。", "solution_name": "递归 + 上下界", "time_complexity": "O(n)", "space_complexity": "O(h)", "solution": "递归函数 isValid(node, lower, upper)：\n检查 node.val 是否在 (lower, upper) 范围内。\n左子树的上界更新为 node.val，右子树的下界更新为 node.val。", "code": "def isValidBST(root):\n    def validate(node, low=float('-inf'), high=float('inf')):\n        if not node:\n            return True\n        if node.val <= low or node.val >= high:\n            return False\n        return (validate(node.left, low, node.val)\n                and validate(node.right, node.val, high))\n    return validate(root)"}, {"id": 230, "title": "二叉搜索树中第 K 小的元素", "difficulty": "中等", "category": "二叉树", "tags": "二叉树 中序遍历", "link": "https://leetcode.cn/problems/kth-smallest-element-in-a-bst/", "hint": "BST 中序遍历得到升序序列，遍历到第 k 个就是答案。", "solution_name": "中序遍历迭代", "time_complexity": "O(H + k)，H 为树高", "space_complexity": "O(H)", "solution": "用栈进行中序遍历，每弹出一个节点 k 减 1，当 k == 0 时返回当前节点值。\n不需要遍历完整棵树，找到第 k 个就停。", "code": "def kthSmallest(root, k):\n    stack = []\n    curr = root\n    while curr or stack:\n        while curr:\n            stack.append(curr)\n            curr = curr.left\n        curr = stack.pop()\n        k -= 1\n        if k == 0:\n            return curr.val\n        curr = curr.right"}, {"id": 199, "title": "二叉树的右视图", "difficulty": "中等", "category": "二叉树", "tags": "二叉树 BFS DFS", "link": "https://leetcode.cn/problems/binary-tree-right-side-view/", "hint": "BFS 层序遍历，每层取最后一个节点。或 DFS 先访问右子树。", "solution_name": "BFS 层序遍历", "time_complexity": "O(n)", "space_complexity": "O(n)", "solution": "BFS 逐层遍历，每层的最后一个节点就是右视图能看到的节点。\n也可以用 DFS：按 根→右→左 的顺序遍历，每层第一个访问的就是右视图节点。", "code": "from collections import deque\n\ndef rightSideView(root):\n    if not root:\n        return []\n    result = []\n    queue = deque([root])\n    while queue:\n        level_size = len(queue)\n        for i in range(level_size):\n            node = queue.popleft()\n            if i == level_size - 1:\n                result.append(node.val)\n            if node.left: queue.append(node.left)\n            if node.right: queue.append(node.right)\n    return result"}, {"id": 114, "title": "二叉树展开为链表", "difficulty": "中等", "category": "二叉树", "tags": "二叉树 链表 DFS", "link": "https://leetcode.cn/problems/flatten-binary-tree-to-linked-list/", "hint": "前序遍历的顺序。可以用 Morris 遍历思想：把左子树的最右节点连到右子树。", "solution_name": "迭代（寻找前驱）", "time_complexity": "O(n)", "space_complexity": "O(1)", "solution": "遍历每个节点：如果有左子树，找到左子树的最右节点，\n将其 right 指向当前节点的右子树。\n然后将当前节点的 right 指向左子树，left 置空。", "code": "def flatten(root):\n    curr = root\n    while curr:\n        if curr.left:\n            # 找左子树最右节点\n            rightmost = curr.left\n            while rightmost.right:\n                rightmost = rightmost.right\n            rightmost.right = curr.right\n            curr.right = curr.left\n            curr.left = None\n        curr = curr.right"}, {"id": 105, "title": "从前序与中序遍历序列构造二叉树", "difficulty": "中等", "category": "二叉树", "tags": "二叉树 分治 哈希表", "link": "https://leetcode.cn/problems/construct-binary-tree-from-preorder-and-inorder-traversal/", "hint": "前序的第一个元素是根，在中序中找到根的位置，左边是左子树，右边是右子树。", "solution_name": "递归 + 哈希表", "time_complexity": "O(n)", "space_complexity": "O(n)", "solution": "前序遍历的第一个元素是根节点。在中序遍历中找到根的位置 idx，\nidx 左边是左子树的中序，右边是右子树的中序。\n根据左子树的大小，在前序中划分左右子树的前序序列，递归构建。\n用哈希表存储中序遍历的值→下标映射，加速查找。", "code": "def buildTree(preorder, inorder):\n    idx_map = {val: i for i, val in enumerate(inorder)}\n    pre_idx = [0]\n    def build(in_left, in_right):\n        if in_left > in_right:\n            return None\n        root_val = preorder[pre_idx[0]]\n        pre_idx[0] += 1\n        root = TreeNode(root_val)\n        idx = idx_map[root_val]\n        root.left = build(in_left, idx - 1)\n        root.right = build(idx + 1, in_right)\n        return root\n    return build(0, len(inorder) - 1)"}, {"id": 437, "title": "路径总和 III", "difficulty": "中等", "category": "二叉树", "tags": "二叉树 前缀和 DFS", "link": "https://leetcode.cn/problems/path-sum-iii/", "hint": "前缀和思想：类似第 560 题，在树上维护从根到当前节点的前缀和。", "solution_name": "前缀和 + DFS", "time_complexity": "O(n)", "space_complexity": "O(n)", "solution": "DFS 遍历树，维护从根到当前节点的前缀和 curr_sum。\n用哈希表记录路径上每个前缀和出现的次数。\n如果 curr_sum - targetSum 在哈希表中，说明存在满足条件的路径。\n回溯时要从哈希表中移除当前前缀和。", "code": "from collections import defaultdict\n\ndef pathSum(root, targetSum):\n    prefix = defaultdict(int)\n    prefix[0] = 1\n    def dfs(node, curr_sum):\n        if not node:\n            return 0\n        curr_sum += node.val\n        count = prefix[curr_sum - targetSum]\n        prefix[curr_sum] += 1\n        count += dfs(node.left, curr_sum)\n        count += dfs(node.right, curr_sum)\n        prefix[curr_sum] -= 1  # 回溯\n        return count\n    return dfs(root, 0)"}, {"id": 236, "title": "二叉树的最近公共祖先", "difficulty": "中等", "category": "二叉树", "tags": "二叉树 DFS 递归", "link": "https://leetcode.cn/problems/lowest-common-ancestor-of-a-binary-tree/", "hint": "递归：如果当前节点是 p 或 q，返回当前节点。如果左右子树各找到一个，当前节点就是 LCA。", "solution_name": "递归", "time_complexity": "O(n)", "space_complexity": "O(h)", "solution": "递归函数返回在子树中找到的 p 或 q（或 None）。\n如果当前节点是 p 或 q，直接返回。\n递归搜索左右子树：如果左右都非空，说明 p 和 q 分别在两侧，当前节点是 LCA。\n如果只有一侧非空，返回那一侧的结果。", "code": "def lowestCommonAncestor(root, p, q):\n    if not root or root == p or root == q:\n        return root\n    left = lowestCommonAncestor(root.left, p, q)\n    right = lowestCommonAncestor(root.right, p, q)\n    if left and right:\n        return root\n    return left if left else right"}, {"id": 124, "title": "二叉树中的最大路径和", "difficulty": "困难", "category": "二叉树", "tags": "二叉树 DFS 动态规划", "link": "https://leetcode.cn/problems/binary-tree-maximum-path-sum/", "hint": "类似直径问题：经过某节点的最大路径和 = node.val + max(0, 左贡献) + max(0, 右贡献)。", "solution_name": "DFS 递归", "time_complexity": "O(n)", "space_complexity": "O(h)", "solution": "对每个节点计算它能向父节点贡献的最大路径和（单边）：\n贡献 = node.val + max(0, max(左贡献, 右贡献))。\n同时更新全局最大路径和 = node.val + max(0, 左贡献) + max(0, 右贡献)。\n取 max(0, ...) 是因为负数贡献不如不选。", "code": "def maxPathSum(root):\n    max_sum = float('-inf')\n    def dfs(node):\n        nonlocal max_sum\n        if not node:\n            return 0\n        left = max(0, dfs(node.left))\n        right = max(0, dfs(node.right))\n        max_sum = max(max_sum, node.val + left + right)\n        return node.val + max(left, right)\n    dfs(root)\n    return max_sum"}, {"id": 200, "title": "岛屿数量", "difficulty": "中等", "category": "图论", "tags": "DFS BFS 并查集", "link": "https://leetcode.cn/problems/number-of-islands/", "hint": "遍历网格，遇到 '1' 就 DFS/BFS 把整个岛标记为已访问，计数 +1。", "solution_name": "DFS 沉岛", "time_complexity": "O(m × n)", "space_complexity": "O(m × n)（递归栈）", "solution": "遍历网格，遇到 '1' 时岛屿数量 +1，然后 DFS 将相连的所有 '1' 标记为 '0'（沉岛）。\n这样每个岛只会被计数一次。", "code": "def numIslands(grid):\n    def dfs(i, j):\n        if i < 0 or i >= len(grid) or j < 0 or j >= len(grid[0]) or grid[i][j] != '1':\n            return\n        grid[i][j] = '0'\n        dfs(i+1, j); dfs(i-1, j); dfs(i, j+1); dfs(i, j-1)\n    count = 0\n    for i in range(len(grid)):\n        for j in range(len(grid[0])):\n            if grid[i][j] == '1':\n                dfs(i, j)\n                count += 1\n    return count"}, {"id": 994, "title": "腐烂的橘子", "difficulty": "中等", "category": "图论", "tags": "BFS 矩阵", "link": "https://leetcode.cn/problems/rotting-oranges/", "hint": "多源 BFS：所有腐烂橘子同时开始扩散，层数就是时间。", "solution_name": "多源 BFS", "time_complexity": "O(m × n)", "space_complexity": "O(m × n)", "solution": "将所有初始腐烂的橘子加入队列，同时统计新鲜橘子数量。\nBFS 逐层扩散，每层代表 1 分钟。每腐烂一个新鲜橘子，fresh 减 1。\nBFS 结束后，如果还有新鲜橘子则返回 -1，否则返回层数。", "code": "from collections import deque\n\ndef orangesRotting(grid):\n    m, n = len(grid), len(grid[0])\n    queue = deque()\n    fresh = 0\n    for i in range(m):\n        for j in range(n):\n            if grid[i][j] == 2:\n                queue.append((i, j))\n            elif grid[i][j] == 1:\n                fresh += 1\n    minutes = 0\n    while queue and fresh > 0:\n        minutes += 1\n        for _ in range(len(queue)):\n            x, y = queue.popleft()\n            for dx, dy in [(1,0),(-1,0),(0,1),(0,-1)]:\n                nx, ny = x+dx, y+dy\n                if 0 <= nx < m and 0 <= ny < n and grid[nx][ny] == 1:\n                    grid[nx][ny] = 2\n                    fresh -= 1\n                    queue.append((nx, ny))\n    return minutes if fresh == 0 else -1"}, {"id": 207, "title": "课程表", "difficulty": "中等", "category": "图论", "tags": "拓扑排序 BFS DFS", "link": "https://leetcode.cn/problems/course-schedule/", "hint": "拓扑排序：如果有环则无法完成所有课程。用入度表 + BFS 检测环。", "solution_name": "拓扑排序（BFS / Kahn 算法）", "time_complexity": "O(V + E)", "space_complexity": "O(V + E)", "solution": "建图并统计每个节点的入度。将入度为 0 的节点入队。\nBFS：每次取出入度为 0 的节点，将其邻居的入度减 1，新的入度为 0 的入队。\n如果最终处理的节点数 == 总课程数，说明无环，可以完成。", "code": "from collections import deque, defaultdict\n\ndef canFinish(numCourses, prerequisites):\n    graph = defaultdict(list)\n    indegree = [0] * numCourses\n    for a, b in prerequisites:\n        graph[b].append(a)\n        indegree[a] += 1\n    queue = deque(i for i in range(numCourses) if indegree[i] == 0)\n    count = 0\n    while queue:\n        node = queue.popleft()\n        count += 1\n        for neighbor in graph[node]:\n            indegree[neighbor] -= 1\n            if indegree[neighbor] == 0:\n                queue.append(neighbor)\n    return count == numCourses"}, {"id": 208, "title": "实现 Trie (前缀树)", "difficulty": "中等", "category": "图论", "tags": "字典树 设计 字符串", "link": "https://leetcode.cn/problems/implement-trie-prefix-tree/", "hint": "每个节点包含 26 个子节点指针和一个 is_end 标记。", "solution_name": "字典树", "time_complexity": "O(m)，m 为字符串长度", "space_complexity": "O(字符集大小 × 字符串总长度)", "solution": "Trie 节点用字典存储子节点。\ninsert：逐字符创建/遍历节点，最后标记 is_end。\nsearch：逐字符遍历，最后检查 is_end。\nstartsWith：逐字符遍历，能走完前缀就返回 True。", "code": "class TrieNode:\n    def __init__(self):\n        self.children = {}\n        self.is_end = False\n\nclass Trie:\n    def __init__(self):\n        self.root = TrieNode()\n\n    def insert(self, word):\n        node = self.root\n        for ch in word:\n            if ch not in node.children:\n                node.children[ch] = TrieNode()\n            node = node.children[ch]\n        node.is_end = True\n\n    def search(self, word):\n        node = self.root\n        for ch in word:\n            if ch not in node.children:\n                return False\n            node = node.children[ch]\n        return node.is_end\n\n    def startsWith(self, prefix):\n        node = self.root\n        for ch in prefix:\n            if ch not in node.children:\n                return False\n            node = node.children[ch]\n        return True"}, {"id": 46, "title": "全排列", "difficulty": "中等", "category": "回溯", "tags": "回溯 数组", "link": "https://leetcode.cn/problems/permutations/", "hint": "回溯：每次选择一个未使用的数字加入路径，选完 n 个就是一个排列。", "solution_name": "回溯", "time_complexity": "O(n × n!)", "space_complexity": "O(n)", "solution": "维护一个 path 和 used 数组。每次从未使用的数字中选一个加入 path，\n递归继续选下一个。当 path 长度等于 n 时，记录结果。\n回溯时撤销选择（弹出 path，标记 used 为 False）。", "code": "def permute(nums):\n    result = []\n    def backtrack(path, used):\n        if len(path) == len(nums):\n            result.append(path[:])\n            return\n        for i in range(len(nums)):\n            if not used[i]:\n                used[i] = True\n                path.append(nums[i])\n                backtrack(path, used)\n                path.pop()\n                used[i] = False\n    backtrack([], [False] * len(nums))\n    return result"}, {"id": 78, "title": "子集", "difficulty": "中等", "category": "回溯", "tags": "回溯 位运算 数组", "link": "https://leetcode.cn/problems/subsets/", "hint": "回溯：对于每个元素，选或不选。或者每次从 start 开始选择加入子集。", "solution_name": "回溯", "time_complexity": "O(n × 2^n)", "space_complexity": "O(n)", "solution": "回溯：从 start 开始，每次选择一个元素加入 path，记录当前 path 为一个子集。\n然后递归选择后面的元素。不需要显式的终止条件，每个状态都是一个合法子集。", "code": "def subsets(nums):\n    result = []\n    def backtrack(start, path):\n        result.append(path[:])\n        for i in range(start, len(nums)):\n            path.append(nums[i])\n            backtrack(i + 1, path)\n            path.pop()\n    backtrack(0, [])\n    return result"}, {"id": 17, "title": "电话号码的字母组合", "difficulty": "中等", "category": "回溯", "tags": "回溯 字符串", "link": "https://leetcode.cn/problems/letter-combinations-of-a-phone-number/", "hint": "建立数字到字母的映射，回溯逐个数字选择对应的字母。", "solution_name": "回溯", "time_complexity": "O(3^m × 4^n)", "space_complexity": "O(m + n)", "solution": "建立数字→字母映射表。回溯：对于当前数字，遍历它对应的所有字母，\n选择一个加入 path，递归处理下一个数字。", "code": "def letterCombinations(digits):\n    if not digits:\n        return []\n    phone = {'2':'abc','3':'def','4':'ghi','5':'jkl',\n             '6':'mno','7':'pqrs','8':'tuv','9':'wxyz'}\n    result = []\n    def backtrack(idx, path):\n        if idx == len(digits):\n            result.append(''.join(path))\n            return\n        for ch in phone[digits[idx]]:\n            path.append(ch)\n            backtrack(idx + 1, path)\n            path.pop()\n    backtrack(0, [])\n    return result"}, {"id": 39, "title": "组合总和", "difficulty": "中等", "category": "回溯", "tags": "回溯 数组", "link": "https://leetcode.cn/problems/combination-sum/", "hint": "回溯：每个数字可以重复使用，所以递归时 start 不变（不是 i+1）。", "solution_name": "回溯", "time_complexity": "O(n^(target/min))", "space_complexity": "O(target/min)", "solution": "排序后回溯。从 start 开始选择，每个数字可以重复使用（递归时传 i 而非 i+1）。\n当 target == 0 时记录结果，target < 0 时剪枝返回。", "code": "def combinationSum(candidates, target):\n    candidates.sort()\n    result = []\n    def backtrack(start, target, path):\n        if target == 0:\n            result.append(path[:])\n            return\n        for i in range(start, len(candidates)):\n            if candidates[i] > target:\n                break\n            path.append(candidates[i])\n            backtrack(i, target - candidates[i], path)\n            path.pop()\n    backtrack(0, target, [])\n    return result"}, {"id": 22, "title": "括号生成", "difficulty": "中等", "category": "回溯", "tags": "回溯 字符串 动态规划", "link": "https://leetcode.cn/problems/generate-parentheses/", "hint": "回溯：维护左括号和右括号的剩余数量，左括号可以随时加，右括号只有在右 < 左时才能加。", "solution_name": "回溯", "time_complexity": "O(4^n / √n)（卡特兰数）", "space_complexity": "O(n)", "solution": "回溯生成：维护 open 和 close 计数。\n如果 open < n，可以加左括号；如果 close < open，可以加右括号。\n当长度达到 2n 时记录结果。", "code": "def generateParenthesis(n):\n    result = []\n    def backtrack(path, open_count, close_count):\n        if len(path) == 2 * n:\n            result.append(''.join(path))\n            return\n        if open_count < n:\n            path.append('(')\n            backtrack(path, open_count + 1, close_count)\n            path.pop()\n        if close_count < open_count:\n            path.append(')')\n            backtrack(path, open_count, close_count + 1)\n            path.pop()\n    backtrack([], 0, 0)\n    return result"}, {"id": 79, "title": "单词搜索", "difficulty": "中等", "category": "回溯", "tags": "回溯 矩阵 DFS", "link": "https://leetcode.cn/problems/word-search/", "hint": "从每个格子出发 DFS，匹配 word 的每个字符，用标记防止重复访问。", "solution_name": "DFS 回溯", "time_complexity": "O(m × n × 3^L)，L 为单词长度", "space_complexity": "O(L)", "solution": "遍历每个格子作为起点，DFS 匹配 word。\n每步检查当前字符是否匹配，匹配则标记已访问，向四个方向递归。\n回溯时恢复标记。匹配完所有字符返回 True。", "code": "def exist(board, word):\n    m, n = len(board), len(board[0])\n    def dfs(i, j, k):\n        if k == len(word):\n            return True\n        if i < 0 or i >= m or j < 0 or j >= n or board[i][j] != word[k]:\n            return False\n        tmp = board[i][j]\n        board[i][j] = '#'  # 标记已访问\n        found = (dfs(i+1,j,k+1) or dfs(i-1,j,k+1)\n                 or dfs(i,j+1,k+1) or dfs(i,j-1,k+1))\n        board[i][j] = tmp  # 回溯\n        return found\n    for i in range(m):\n        for j in range(n):\n            if dfs(i, j, 0):\n                return True\n    return False"}, {"id": 131, "title": "分割回文串", "difficulty": "中等", "category": "回溯", "tags": "回溯 字符串 动态规划", "link": "https://leetcode.cn/problems/palindrome-partitioning/", "hint": "回溯：从位置 start 开始，尝试所有可能的分割点，如果前缀是回文就递归处理剩余部分。", "solution_name": "回溯 + 回文判断", "time_complexity": "O(n × 2^n)", "space_complexity": "O(n)", "solution": "回溯：从 start 开始，枚举 end，如果 s[start:end+1] 是回文，\n加入 path 并递归处理 end+1 开始的部分。\n当 start == len(s) 时记录结果。可以预处理回文表加速判断。", "code": "def partition(s):\n    result = []\n    def is_palindrome(sub):\n        return sub == sub[::-1]\n    def backtrack(start, path):\n        if start == len(s):\n            result.append(path[:])\n            return\n        for end in range(start, len(s)):\n            if is_palindrome(s[start:end+1]):\n                path.append(s[start:end+1])\n                backtrack(end + 1, path)\n                path.pop()\n    backtrack(0, [])\n    return result"}, {"id": 51, "title": "N 皇后", "difficulty": "困难", "category": "回溯", "tags": "回溯 数组", "link": "https://leetcode.cn/problems/n-queens/", "hint": "逐行放置皇后，用集合记录已占用的列、主对角线、副对角线。", "solution_name": "回溯 + 集合剪枝", "time_complexity": "O(n!)", "space_complexity": "O(n)", "solution": "逐行放置皇后。用三个集合记录已占用的列、主对角线（row-col）、副对角线（row+col）。\n对于每一行，尝试每一列，如果不冲突就放置并递归下一行。", "code": "def solveNQueens(n):\n    result = []\n    def backtrack(row, cols, diag1, diag2, board):\n        if row == n:\n            result.append([''.join(r) for r in board])\n            return\n        for col in range(n):\n            if col in cols or row-col in diag1 or row+col in diag2:\n                continue\n            board[row][col] = 'Q'\n            cols.add(col); diag1.add(row-col); diag2.add(row+col)\n            backtrack(row+1, cols, diag1, diag2, board)\n            board[row][col] = '.'\n            cols.remove(col); diag1.remove(row-col); diag2.remove(row+col)\n    board = [['.']*n for _ in range(n)]\n    backtrack(0, set(), set(), set(), board)\n    return result"}, {"id": 35, "title": "搜索插入位置", "difficulty": "简单", "category": "二分查找", "tags": "二分查找 数组", "link": "https://leetcode.cn/problems/search-insert-position/", "hint": "标准二分查找，找到第一个 >= target 的位置。", "solution_name": "二分查找", "time_complexity": "O(log n)", "space_complexity": "O(1)", "solution": "标准二分查找模板。维护 left=0, right=len(nums)。\n当 nums[mid] < target 时 left = mid+1，否则 right = mid。\n最终 left 就是插入位置（第一个 >= target 的下标）。", "code": "def searchInsert(nums, target):\n    left, right = 0, len(nums)\n    while left < right:\n        mid = (left + right) // 2\n        if nums[mid] < target:\n            left = mid + 1\n        else:\n            right = mid\n    return left"}, {"id": 74, "title": "搜索二维矩阵", "difficulty": "中等", "category": "二分查找", "tags": "二分查找 矩阵", "link": "https://leetcode.cn/problems/search-a-2d-matrix/", "hint": "把二维矩阵看成一维有序数组，用一次二分查找。", "solution_name": "一维二分查找", "time_complexity": "O(log(m × n))", "space_complexity": "O(1)", "solution": "将 m×n 矩阵视为长度 m*n 的有序数组。\n下标 mid 对应矩阵位置 (mid // n, mid % n)。\n标准二分查找即可。", "code": "def searchMatrix(matrix, target):\n    m, n = len(matrix), len(matrix[0])\n    left, right = 0, m * n - 1\n    while left <= right:\n        mid = (left + right) // 2\n        val = matrix[mid // n][mid % n]\n        if val == target:\n            return True\n        elif val < target:\n            left = mid + 1\n        else:\n            right = mid - 1\n    return False"}, {"id": 34, "title": "在排序数组中查找元素的第一个和最后一个位置", "difficulty": "中等", "category": "二分查找", "tags": "二分查找 数组", "link": "https://leetcode.cn/problems/find-first-and-last-position-of-element-in-sorted-array/", "hint": "两次二分：一次找左边界（第一个 == target），一次找右边界（最后一个 == target）。", "solution_name": "两次二分查找", "time_complexity": "O(log n)", "space_complexity": "O(1)", "solution": "第一次二分找第一个 >= target 的位置（左边界）。\n第二次二分找第一个 > target 的位置减 1（右边界）。\n检查边界是否有效且值等于 target。", "code": "def searchRange(nums, target):\n    def bisect_left(nums, target):\n        lo, hi = 0, len(nums)\n        while lo < hi:\n            mid = (lo + hi) // 2\n            if nums[mid] < target: lo = mid + 1\n            else: hi = mid\n        return lo\n    left = bisect_left(nums, target)\n    right = bisect_left(nums, target + 1) - 1\n    if left <= right and left < len(nums) and nums[left] == target:\n        return [left, right]\n    return [-1, -1]"}, {"id": 33, "title": "搜索旋转排序数组", "difficulty": "中等", "category": "二分查找", "tags": "二分查找 数组", "link": "https://leetcode.cn/problems/search-in-rotated-sorted-array/", "hint": "二分后，左半或右半一定有一半是有序的，判断 target 在有序的那半边还是另一半。", "solution_name": "二分查找", "time_complexity": "O(log n)", "space_complexity": "O(1)", "solution": "二分查找，每次判断 mid 在哪一段有序区间内。\n如果 nums[left] <= nums[mid]，说明左半有序：\n  如果 target 在 [left, mid) 范围内，right = mid-1，否则 left = mid+1。\n否则右半有序，类似处理。", "code": "def search(nums, target):\n    left, right = 0, len(nums) - 1\n    while left <= right:\n        mid = (left + right) // 2\n        if nums[mid] == target:\n            return mid\n        if nums[left] <= nums[mid]:  # 左半有序\n            if nums[left] <= target < nums[mid]:\n                right = mid - 1\n            else:\n                left = mid + 1\n        else:  # 右半有序\n            if nums[mid] < target <= nums[right]:\n                left = mid + 1\n            else:\n                right = mid - 1\n    return -1"}, {"id": 153, "title": "寻找旋转排序数组中的最小值", "difficulty": "中等", "category": "二分查找", "tags": "二分查找 数组", "link": "https://leetcode.cn/problems/find-minimum-in-rotated-sorted-array/", "hint": "二分：如果 nums[mid] > nums[right]，最小值在右半；否则在左半（含 mid）。", "solution_name": "二分查找", "time_complexity": "O(log n)", "space_complexity": "O(1)", "solution": "比较 nums[mid] 和 nums[right]：\n如果 nums[mid] > nums[right]，说明旋转点在右半，left = mid + 1。\n否则旋转点在左半（含 mid），right = mid。\n最终 left == right 就是最小值位置。", "code": "def findMin(nums):\n    left, right = 0, len(nums) - 1\n    while left < right:\n        mid = (left + right) // 2\n        if nums[mid] > nums[right]:\n            left = mid + 1\n        else:\n            right = mid\n    return nums[left]"}, {"id": 4, "title": "寻找两个正序数组的中位数", "difficulty": "困难", "category": "二分查找", "tags": "二分查找 分治", "link": "https://leetcode.cn/problems/median-of-two-sorted-arrays/", "hint": "在较短的数组上二分，找到一个分割点使得左半部分的最大值 <= 右半部分的最小值。", "solution_name": "二分查找分割", "time_complexity": "O(log min(m, n))", "space_complexity": "O(1)", "solution": "在较短数组上二分，找分割位置 i，另一个数组的分割位置 j = (m+n+1)//2 - i。\n确保 nums1[i-1] <= nums2[j] 且 nums2[j-1] <= nums1[i]。\n中位数由分割线两侧的元素决定。", "code": "def findMedianSortedArrays(nums1, nums2):\n    if len(nums1) > len(nums2):\n        nums1, nums2 = nums2, nums1\n    m, n = len(nums1), len(nums2)\n    lo, hi = 0, m\n    while lo <= hi:\n        i = (lo + hi) // 2\n        j = (m + n + 1) // 2 - i\n        left1 = nums1[i-1] if i > 0 else float('-inf')\n        right1 = nums1[i] if i < m else float('inf')\n        left2 = nums2[j-1] if j > 0 else float('-inf')\n        right2 = nums2[j] if j < n else float('inf')\n        if left1 <= right2 and left2 <= right1:\n            if (m + n) % 2 == 1:\n                return max(left1, left2)\n            return (max(left1, left2) + min(right1, right2)) / 2\n        elif left1 > right2:\n            hi = i - 1\n        else:\n            lo = i + 1"}, {"id": 20, "title": "有效的括号", "difficulty": "简单", "category": "栈", "tags": "栈 字符串", "link": "https://leetcode.cn/problems/valid-parentheses/", "hint": "遇到左括号压栈，遇到右括号检查栈顶是否匹配。", "solution_name": "栈", "time_complexity": "O(n)", "space_complexity": "O(n)", "solution": "遍历字符串：遇到左括号压栈，遇到右括号弹出栈顶检查是否匹配。\n最后栈为空则有效。", "code": "def isValid(s):\n    stack = []\n    mapping = {')':'(', ']':'[', '}':'{'}\n    for ch in s:\n        if ch in mapping:\n            if not stack or stack[-1] != mapping[ch]:\n                return False\n            stack.pop()\n        else:\n            stack.append(ch)\n    return not stack"}, {"id": 155, "title": "最小栈", "difficulty": "中等", "category": "栈", "tags": "栈 设计", "link": "https://leetcode.cn/problems/min-stack/", "hint": "用一个辅助栈同步记录当前最小值。", "solution_name": "辅助栈", "time_complexity": "O(1)（所有操作）", "space_complexity": "O(n)", "solution": "主栈正常 push/pop。辅助栈 min_stack 同步维护：\npush 时，辅助栈压入 min(val, min_stack[-1])。\npop 时，辅助栈也 pop。getMin 返回辅助栈栈顶。", "code": "class MinStack:\n    def __init__(self):\n        self.stack = []\n        self.min_stack = [float('inf')]\n\n    def push(self, val):\n        self.stack.append(val)\n        self.min_stack.append(min(val, self.min_stack[-1]))\n\n    def pop(self):\n        self.stack.pop()\n        self.min_stack.pop()\n\n    def top(self):\n        return self.stack[-1]\n\n    def getMin(self):\n        return self.min_stack[-1]"}, {"id": 394, "title": "字符串解码", "difficulty": "中等", "category": "栈", "tags": "栈 字符串 递归", "link": "https://leetcode.cn/problems/decode-string/", "hint": "用栈保存之前的字符串和重复次数，遇到 ] 时弹出并拼接。", "solution_name": "栈", "time_complexity": "O(n)", "space_complexity": "O(n)", "solution": "维护当前字符串 curr_str 和当前数字 curr_num。\n遇到 [：将 curr_str 和 curr_num 压栈，重置。\n遇到 ]：弹出栈顶的 prev_str 和 num，curr_str = prev_str + num * curr_str。\n遇到数字：累积到 curr_num。遇到字母：追加到 curr_str。", "code": "def decodeString(s):\n    stack = []\n    curr_str = ''\n    curr_num = 0\n    for ch in s:\n        if ch == '[':\n            stack.append((curr_str, curr_num))\n            curr_str, curr_num = '', 0\n        elif ch == ']':\n            prev_str, num = stack.pop()\n            curr_str = prev_str + num * curr_str\n        elif ch.isdigit():\n            curr_num = curr_num * 10 + int(ch)\n        else:\n            curr_str += ch\n    return curr_str"}, {"id": 739, "title": "每日温度", "difficulty": "中等", "category": "栈", "tags": "单调栈 数组", "link": "https://leetcode.cn/problems/daily-temperatures/", "hint": "单调递减栈：栈中存下标，遇到更高温度时弹出栈顶并计算等待天数。", "solution_name": "单调栈", "time_complexity": "O(n)", "space_complexity": "O(n)", "solution": "维护一个单调递减栈（存下标）。遍历温度数组：\n当栈非空且当前温度 > 栈顶温度时，弹出栈顶，计算天数差。\n将当前下标压栈。", "code": "def dailyTemperatures(temperatures):\n    n = len(temperatures)\n    answer = [0] * n\n    stack = []  # 存下标\n    for i in range(n):\n        while stack and temperatures[i] > temperatures[stack[-1]]:\n            j = stack.pop()\n            answer[j] = i - j\n        stack.append(i)\n    return answer"}, {"id": 84, "title": "柱状图中最大的矩形", "difficulty": "困难", "category": "栈", "tags": "单调栈 数组", "link": "https://leetcode.cn/problems/largest-rectangle-in-histogram/", "hint": "单调递增栈：对每个柱子找到左右第一个比它矮的位置，宽度 × 高度就是面积。", "solution_name": "单调栈", "time_complexity": "O(n)", "space_complexity": "O(n)", "solution": "维护单调递增栈（存下标）。遍历柱子：\n当栈非空且当前高度 < 栈顶高度时，弹出栈顶 h，\n宽度 = i - stack[-1] - 1（如果栈空则宽度为 i）。\n面积 = h × 宽度，更新最大值。最后在数组末尾加一个 0 确保所有柱子被处理。", "code": "def largestRectangleArea(heights):\n    heights.append(0)  # 哨兵\n    stack = [-1]\n    max_area = 0\n    for i in range(len(heights)):\n        while stack[-1] != -1 and heights[i] < heights[stack[-1]]:\n            h = heights[stack.pop()]\n            w = i - stack[-1] - 1\n            max_area = max(max_area, h * w)\n        stack.append(i)\n    heights.pop()  # 恢复\n    return max_area"}, {"id": 215, "title": "数组中的第 K 个最大元素", "difficulty": "中等", "category": "堆", "tags": "堆 快速选择 排序", "link": "https://leetcode.cn/problems/kth-largest-element-in-an-array/", "hint": "用大小为 k 的最小堆，或者快速选择算法。", "solution_name": "最小堆", "time_complexity": "O(n log k)", "space_complexity": "O(k)", "solution": "维护一个大小为 k 的最小堆。遍历数组，每个元素入堆，\n如果堆大小超过 k 就弹出堆顶（最小值）。\n遍历结束后堆顶就是第 k 大的元素。", "code": "import heapq\n\ndef findKthLargest(nums, k):\n    heap = []\n    for num in nums:\n        heapq.heappush(heap, num)\n        if len(heap) > k:\n            heapq.heappop(heap)\n    return heap[0]"}, {"id": 347, "title": "前 K 个高频元素", "difficulty": "中等", "category": "堆", "tags": "堆 哈希表 桶排序", "link": "https://leetcode.cn/problems/top-k-frequent-elements/", "hint": "先统计频次，然后用大小为 k 的最小堆维护前 k 高频元素。", "solution_name": "哈希表 + 最小堆", "time_complexity": "O(n log k)", "space_complexity": "O(n)", "solution": "先用 Counter 统计每个元素的频次。\n然后用大小为 k 的最小堆，按频次维护前 k 个高频元素。\n也可以用桶排序：频次作为下标，O(n) 时间。", "code": "from collections import Counter\nimport heapq\n\ndef topKFrequent(nums, k):\n    count = Counter(nums)\n    return heapq.nlargest(k, count.keys(), key=count.get)"}, {"id": 295, "title": "数据流的中位数", "difficulty": "困难", "category": "堆", "tags": "堆 设计 排序", "link": "https://leetcode.cn/problems/find-median-from-data-stream/", "hint": "用一个最大堆存较小的一半，一个最小堆存较大的一半，保持两堆大小平衡。", "solution_name": "对顶堆", "time_complexity": "O(log n)（addNum），O(1)（findMedian）", "space_complexity": "O(n)", "solution": "max_heap 存较小的一半（取反模拟最大堆），min_heap 存较大的一半。\naddNum：先加入 max_heap，再将 max_heap 堆顶移到 min_heap，\n如果 min_heap 更大则移回一个。保持 max_heap 大小 >= min_heap。\nfindMedian：如果两堆大小相等取平均，否则取 max_heap 堆顶。", "code": "import heapq\n\nclass MedianFinder:\n    def __init__(self):\n        self.small = []  # 最大堆（取反）\n        self.large = []  # 最小堆\n\n    def addNum(self, num):\n        heapq.heappush(self.small, -num)\n        heapq.heappush(self.large, -heapq.heappop(self.small))\n        if len(self.large) > len(self.small):\n            heapq.heappush(self.small, -heapq.heappop(self.large))\n\n    def findMedian(self):\n        if len(self.small) > len(self.large):\n            return -self.small[0]\n        return (-self.small[0] + self.large[0]) / 2"}, {"id": 121, "title": "买卖股票的最佳时机", "difficulty": "简单", "category": "贪心", "tags": "贪心 数组 动态规划", "link": "https://leetcode.cn/problems/best-time-to-buy-and-sell-stock/", "hint": "遍历时维护到目前为止的最低价格，每天计算如果今天卖出的利润。", "solution_name": "一次遍历", "time_complexity": "O(n)", "space_complexity": "O(1)", "solution": "维护 min_price 记录到目前为止的最低价格。\n对于每天的价格，计算 price - min_price 作为今天卖出的利润，更新最大利润。\n同时更新 min_price。", "code": "def maxProfit(prices):\n    min_price = float('inf')\n    max_profit = 0\n    for price in prices:\n        min_price = min(min_price, price)\n        max_profit = max(max_profit, price - min_price)\n    return max_profit"}, {"id": 55, "title": "跳跃游戏", "difficulty": "中等", "category": "贪心", "tags": "贪心 数组", "link": "https://leetcode.cn/problems/jump-game/", "hint": "维护能到达的最远位置 max_reach，如果某个位置超过 max_reach 则无法到达。", "solution_name": "贪心", "time_complexity": "O(n)", "space_complexity": "O(1)", "solution": "维护 max_reach 表示当前能到达的最远位置。\n遍历数组，如果当前位置 i > max_reach，说明无法到达，返回 False。\n否则更新 max_reach = max(max_reach, i + nums[i])。\n如果 max_reach >= n-1，返回 True。", "code": "def canJump(nums):\n    max_reach = 0\n    for i in range(len(nums)):\n        if i > max_reach:\n            return False\n        max_reach = max(max_reach, i + nums[i])\n    return True"}, {"id": 45, "title": "跳跃游戏 II", "difficulty": "中等", "category": "贪心", "tags": "贪心 数组", "link": "https://leetcode.cn/problems/jump-game-ii/", "hint": "贪心：在当前跳跃范围内，找到能跳最远的位置作为下一跳的起点。", "solution_name": "贪心", "time_complexity": "O(n)", "space_complexity": "O(1)", "solution": "维护 end（当前跳跃的边界）和 farthest（当前范围内能到的最远位置）。\n遍历数组，更新 farthest。当 i == end 时，必须跳一步，steps++，end = farthest。", "code": "def jump(nums):\n    steps = 0\n    end = 0\n    farthest = 0\n    for i in range(len(nums) - 1):\n        farthest = max(farthest, i + nums[i])\n        if i == end:\n            steps += 1\n            end = farthest\n    return steps"}, {"id": 763, "title": "划分字母区间", "difficulty": "中等", "category": "贪心", "tags": "贪心 哈希表 字符串", "link": "https://leetcode.cn/problems/partition-labels/", "hint": "记录每个字母最后出现的位置，遍历时维护当前区间的最远边界。", "solution_name": "贪心", "time_complexity": "O(n)", "space_complexity": "O(1)", "solution": "先遍历一遍记录每个字母最后出现的位置 last[ch]。\n再遍历字符串，维护当前区间的右边界 end = max(end, last[s[i]])。\n当 i == end 时，说明当前区间内的所有字母都不会出现在后面，记录区间长度。", "code": "def partitionLabels(s):\n    last = {ch: i for i, ch in enumerate(s)}\n    result = []\n    start = end = 0\n    for i, ch in enumerate(s):\n        end = max(end, last[ch])\n        if i == end:\n            result.append(end - start + 1)\n            start = end + 1\n    return result"}, {"id": 70, "title": "爬楼梯", "difficulty": "简单", "category": "动态规划", "tags": "动态规划 记忆化", "link": "https://leetcode.cn/problems/climbing-stairs/", "hint": "dp[i] = dp[i-1] + dp[i-2]，就是斐波那契数列。", "solution_name": "动态规划", "time_complexity": "O(n)", "space_complexity": "O(1)", "solution": "到第 i 阶的方法数 = 到第 i-1 阶 + 到第 i-2 阶（最后一步走 1 阶或 2 阶）。\n就是斐波那契数列。只需两个变量滚动即可。", "code": "def climbStairs(n):\n    if n <= 2:\n        return n\n    a, b = 1, 2\n    for _ in range(3, n + 1):\n        a, b = b, a + b\n    return b"}, {"id": 118, "title": "杨辉三角", "difficulty": "简单", "category": "动态规划", "tags": "动态规划 数组", "link": "https://leetcode.cn/problems/pascals-triangle/", "hint": "每行的每个元素 = 上一行的左上 + 正上。", "solution_name": "逐行构建", "time_complexity": "O(n²)", "space_complexity": "O(n²)", "solution": "逐行构建：每行首尾为 1，中间元素 = 上一行 [j-1] + [j]。", "code": "def generate(numRows):\n    triangle = []\n    for i in range(numRows):\n        row = [1] * (i + 1)\n        for j in range(1, i):\n            row[j] = triangle[i-1][j-1] + triangle[i-1][j]\n        triangle.append(row)\n    return triangle"}, {"id": 198, "title": "打家劫舍", "difficulty": "中等", "category": "动态规划", "tags": "动态规划 数组", "link": "https://leetcode.cn/problems/house-robber/", "hint": "dp[i] = max(dp[i-1], dp[i-2] + nums[i])，偷或不偷当前房子。", "solution_name": "动态规划", "time_complexity": "O(n)", "space_complexity": "O(1)", "solution": "对于每间房子，选择偷或不偷：\n偷：dp[i-2] + nums[i]（不能偷相邻的）。\n不偷：dp[i-1]。\ndp[i] = max(dp[i-1], dp[i-2] + nums[i])。用两个变量滚动。", "code": "def rob(nums):\n    prev, curr = 0, 0\n    for num in nums:\n        prev, curr = curr, max(curr, prev + num)\n    return curr"}, {"id": 279, "title": "完全平方数", "difficulty": "中等", "category": "动态规划", "tags": "动态规划 BFS 数学", "link": "https://leetcode.cn/problems/perfect-squares/", "hint": "dp[i] = min(dp[i - j*j] + 1)，其中 j*j <= i。", "solution_name": "动态规划", "time_complexity": "O(n√n)", "space_complexity": "O(n)", "solution": "dp[i] 表示组成 i 的最少完全平方数个数。\n对于每个 i，遍历所有 j 使得 j*j <= i，dp[i] = min(dp[i], dp[i-j*j] + 1)。\n初始 dp[0] = 0。", "code": "def numSquares(n):\n    dp = [float('inf')] * (n + 1)\n    dp[0] = 0\n    for i in range(1, n + 1):\n        j = 1\n        while j * j <= i:\n            dp[i] = min(dp[i], dp[i - j*j] + 1)\n            j += 1\n    return dp[n]"}, {"id": 322, "title": "零钱兑换", "difficulty": "中等", "category": "动态规划", "tags": "动态规划 BFS", "link": "https://leetcode.cn/problems/coin-change/", "hint": "dp[i] = min(dp[i - coin] + 1)，遍历所有硬币面值。", "solution_name": "动态规划", "time_complexity": "O(amount × n)", "space_complexity": "O(amount)", "solution": "dp[i] 表示凑成金额 i 的最少硬币数。\n对于每个金额 i，遍历所有硬币 coin，dp[i] = min(dp[i], dp[i-coin] + 1)。\n初始 dp[0] = 0，其余为 inf。如果 dp[amount] 仍为 inf 则返回 -1。", "code": "def coinChange(coins, amount):\n    dp = [float('inf')] * (amount + 1)\n    dp[0] = 0\n    for i in range(1, amount + 1):\n        for coin in coins:\n            if coin <= i:\n                dp[i] = min(dp[i], dp[i - coin] + 1)\n    return dp[amount] if dp[amount] != float('inf') else -1"}, {"id": 139, "title": "单词拆分", "difficulty": "中等", "category": "动态规划", "tags": "动态规划 字符串 哈希表", "link": "https://leetcode.cn/problems/word-break/", "hint": "dp[i] 表示 s[:i] 能否被拆分。dp[i] = any(dp[j] and s[j:i] in wordDict)。", "solution_name": "动态规划", "time_complexity": "O(n²)", "space_complexity": "O(n)", "solution": "dp[i] 表示 s 的前 i 个字符能否被拆分。\n对于每个 i，遍历 j (0 到 i-1)，如果 dp[j] 为 True 且 s[j:i] 在字典中，则 dp[i] = True。\n初始 dp[0] = True（空字符串）。", "code": "def wordBreak(s, wordDict):\n    word_set = set(wordDict)\n    n = len(s)\n    dp = [False] * (n + 1)\n    dp[0] = True\n    for i in range(1, n + 1):\n        for j in range(i):\n            if dp[j] and s[j:i] in word_set:\n                dp[i] = True\n                break\n    return dp[n]"}, {"id": 300, "title": "最长递增子序列", "difficulty": "中等", "category": "动态规划", "tags": "动态规划 二分查找 贪心", "link": "https://leetcode.cn/problems/longest-increasing-subsequence/", "hint": "O(n²) DP 或 O(n log n) 贪心+二分：维护一个 tails 数组，用二分查找更新。", "solution_name": "贪心 + 二分查找", "time_complexity": "O(n log n)", "space_complexity": "O(n)", "solution": "维护 tails 数组，tails[i] 表示长度为 i+1 的递增子序列的最小末尾元素。\n遍历 nums，用二分查找在 tails 中找到第一个 >= num 的位置：\n如果找到则替换，否则追加。最终 tails 的长度就是 LIS 长度。", "code": "import bisect\n\ndef lengthOfLIS(nums):\n    tails = []\n    for num in nums:\n        pos = bisect.bisect_left(tails, num)\n        if pos == len(tails):\n            tails.append(num)\n        else:\n            tails[pos] = num\n    return len(tails)"}, {"id": 152, "title": "乘积最大子数组", "difficulty": "中等", "category": "动态规划", "tags": "动态规划 数组", "link": "https://leetcode.cn/problems/maximum-product-subarray/", "hint": "同时维护以当前元素结尾的最大乘积和最小乘积（负数翻转）。", "solution_name": "动态规划", "time_complexity": "O(n)", "space_complexity": "O(1)", "solution": "因为负数 × 负数 = 正数，所以需要同时维护最大值和最小值。\n对于每个元素：new_max = max(num, max_val*num, min_val*num)，\nnew_min = min(num, max_val*num, min_val*num)。\n更新全局最大值。", "code": "def maxProduct(nums):\n    max_val = min_val = result = nums[0]\n    for num in nums[1:]:\n        candidates = (num, max_val * num, min_val * num)\n        max_val = max(candidates)\n        min_val = min(candidates)\n        result = max(result, max_val)\n    return result"}, {"id": 416, "title": "分割等和子集", "difficulty": "中等", "category": "动态规划", "tags": "动态规划 背包", "link": "https://leetcode.cn/problems/partition-equal-subset-sum/", "hint": "转化为 0-1 背包问题：能否从数组中选出若干数使其和等于 total/2。", "solution_name": "0-1 背包", "time_complexity": "O(n × target)", "space_complexity": "O(target)", "solution": "总和为奇数直接返回 False。target = sum // 2。\ndp[j] 表示能否凑出和为 j。遍历每个数 num，从 target 到 num 倒序更新：\ndp[j] = dp[j] or dp[j - num]。", "code": "def canPartition(nums):\n    total = sum(nums)\n    if total % 2 != 0:\n        return False\n    target = total // 2\n    dp = [False] * (target + 1)\n    dp[0] = True\n    for num in nums:\n        for j in range(target, num - 1, -1):\n            dp[j] = dp[j] or dp[j - num]\n    return dp[target]"}, {"id": 32, "title": "最长有效括号", "difficulty": "困难", "category": "动态规划", "tags": "动态规划 栈 字符串", "link": "https://leetcode.cn/problems/longest-valid-parentheses/", "hint": "dp[i] 表示以 s[i] 结尾的最长有效括号长度。只有 s[i] == ')' 时才可能非零。", "solution_name": "动态规划", "time_complexity": "O(n)", "space_complexity": "O(n)", "solution": "dp[i] 表示以 s[i] 结尾的最长有效括号长度。\n如果 s[i] == ')' 且 s[i-1] == '('，则 dp[i] = dp[i-2] + 2。\n如果 s[i] == ')' 且 s[i-1] == ')' 且 s[i-dp[i-1]-1] == '('，\n则 dp[i] = dp[i-1] + 2 + dp[i-dp[i-1]-2]。", "code": "def longestValidParentheses(s):\n    n = len(s)\n    dp = [0] * n\n    max_len = 0\n    for i in range(1, n):\n        if s[i] == ')':\n            if s[i-1] == '(':\n                dp[i] = (dp[i-2] if i >= 2 else 0) + 2\n            elif i - dp[i-1] > 0 and s[i-dp[i-1]-1] == '(':\n                dp[i] = dp[i-1] + 2\n                if i - dp[i-1] >= 2:\n                    dp[i] += dp[i-dp[i-1]-2]\n            max_len = max(max_len, dp[i])\n    return max_len"}, {"id": 62, "title": "不同路径", "difficulty": "中等", "category": "多维动态规划", "tags": "动态规划 数学 组合", "link": "https://leetcode.cn/problems/unique-paths/", "hint": "dp[i][j] = dp[i-1][j] + dp[i][j-1]，只能向右或向下走。", "solution_name": "动态规划", "time_complexity": "O(m × n)", "space_complexity": "O(n)", "solution": "dp[i][j] 表示到达 (i,j) 的路径数。\n只能从上方或左方到达：dp[i][j] = dp[i-1][j] + dp[i][j-1]。\n可以用一维数组滚动优化空间。", "code": "def uniquePaths(m, n):\n    dp = [1] * n\n    for i in range(1, m):\n        for j in range(1, n):\n            dp[j] += dp[j-1]\n    return dp[-1]"}, {"id": 64, "title": "最小路径和", "difficulty": "中等", "category": "多维动态规划", "tags": "动态规划 矩阵", "link": "https://leetcode.cn/problems/minimum-path-sum/", "hint": "dp[i][j] = grid[i][j] + min(dp[i-1][j], dp[i][j-1])。", "solution_name": "动态规划", "time_complexity": "O(m × n)", "space_complexity": "O(n)", "solution": "dp[i][j] 表示到达 (i,j) 的最小路径和。\ndp[i][j] = grid[i][j] + min(上方, 左方)。\n第一行和第一列只有一个方向，需要特殊处理。", "code": "def minPathSum(grid):\n    m, n = len(grid), len(grid[0])\n    dp = [0] * n\n    dp[0] = grid[0][0]\n    for j in range(1, n):\n        dp[j] = dp[j-1] + grid[0][j]\n    for i in range(1, m):\n        dp[0] += grid[i][0]\n        for j in range(1, n):\n            dp[j] = grid[i][j] + min(dp[j], dp[j-1])\n    return dp[-1]"}, {"id": 5, "title": "最长回文子串", "difficulty": "中等", "category": "多维动态规划", "tags": "动态规划 字符串 中心扩展", "link": "https://leetcode.cn/problems/longest-palindromic-substring/", "hint": "中心扩展法：以每个字符（和每两个相邻字符）为中心向两边扩展。", "solution_name": "中心扩展", "time_complexity": "O(n²)", "space_complexity": "O(1)", "solution": "遍历每个位置作为回文中心，分别考虑奇数长度和偶数长度。\n从中心向两边扩展，直到字符不匹配。记录最长的回文子串。", "code": "def longestPalindrome(s):\n    def expand(l, r):\n        while l >= 0 and r < len(s) and s[l] == s[r]:\n            l -= 1; r += 1\n        return s[l+1:r]\n    result = ''\n    for i in range(len(s)):\n        odd = expand(i, i)\n        even = expand(i, i + 1)\n        result = max(result, odd, even, key=len)\n    return result"}, {"id": 1143, "title": "最长公共子序列", "difficulty": "中等", "category": "多维动态规划", "tags": "动态规划 字符串", "link": "https://leetcode.cn/problems/longest-common-subsequence/", "hint": "dp[i][j] 表示 text1[:i] 和 text2[:j] 的 LCS 长度。字符相等则 +1，否则取 max。", "solution_name": "二维 DP", "time_complexity": "O(m × n)", "space_complexity": "O(m × n)", "solution": "dp[i][j] 表示 text1 前 i 个字符和 text2 前 j 个字符的 LCS 长度。\n如果 text1[i-1] == text2[j-1]，dp[i][j] = dp[i-1][j-1] + 1。\n否则 dp[i][j] = max(dp[i-1][j], dp[i][j-1])。", "code": "def longestCommonSubsequence(text1, text2):\n    m, n = len(text1), len(text2)\n    dp = [[0] * (n + 1) for _ in range(m + 1)]\n    for i in range(1, m + 1):\n        for j in range(1, n + 1):\n            if text1[i-1] == text2[j-1]:\n                dp[i][j] = dp[i-1][j-1] + 1\n            else:\n                dp[i][j] = max(dp[i-1][j], dp[i][j-1])\n    return dp[m][n]"}, {"id": 72, "title": "编辑距离", "difficulty": "中等", "category": "多维动态规划", "tags": "动态规划 字符串", "link": "https://leetcode.cn/problems/edit-distance/", "hint": "dp[i][j] 表示 word1[:i] 转换为 word2[:j] 的最少操作数。三种操作对应三个转移。", "solution_name": "二维 DP", "time_complexity": "O(m × n)", "space_complexity": "O(m × n)", "solution": "dp[i][j] 表示 word1 前 i 个字符变成 word2 前 j 个字符的最少操作数。\n如果 word1[i-1] == word2[j-1]，dp[i][j] = dp[i-1][j-1]（不需要操作）。\n否则 dp[i][j] = 1 + min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1])，\n分别对应删除、插入、替换。", "code": "def minDistance(word1, word2):\n    m, n = len(word1), len(word2)\n    dp = [[0] * (n + 1) for _ in range(m + 1)]\n    for i in range(m + 1): dp[i][0] = i\n    for j in range(n + 1): dp[0][j] = j\n    for i in range(1, m + 1):\n        for j in range(1, n + 1):\n            if word1[i-1] == word2[j-1]:\n                dp[i][j] = dp[i-1][j-1]\n            else:\n                dp[i][j] = 1 + min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1])\n    return dp[m][n]"}, {"id": 136, "title": "只出现一次的数字", "difficulty": "简单", "category": "技巧", "tags": "位运算 数组", "link": "https://leetcode.cn/problems/single-number/", "hint": "异或运算：a ^ a = 0，a ^ 0 = a。所有数异或一遍，成对的抵消，剩下的就是答案。", "solution_name": "异或", "time_complexity": "O(n)", "space_complexity": "O(1)", "solution": "利用异或性质：x ^ x = 0，x ^ 0 = x。\n将所有数字异或一遍，出现两次的数字互相抵消为 0，最终结果就是只出现一次的数字。", "code": "def singleNumber(nums):\n    result = 0\n    for num in nums:\n        result ^= num\n    return result"}, {"id": 169, "title": "多数元素", "difficulty": "简单", "category": "技巧", "tags": "数组 哈希表 投票", "link": "https://leetcode.cn/problems/majority-element/", "hint": "Boyer-Moore 投票算法：维护候选人和计数，遇到相同的 +1，不同的 -1，归零时换候选人。", "solution_name": "Boyer-Moore 投票", "time_complexity": "O(n)", "space_complexity": "O(1)", "solution": "维护候选人 candidate 和计数 count。\n遍历数组：count == 0 时更换候选人；当前数 == candidate 则 count++，否则 count--。\n多数元素一定是最终的候选人（因为它出现次数 > n/2）。", "code": "def majorityElement(nums):\n    candidate = count = 0\n    for num in nums:\n        if count == 0:\n            candidate = num\n        count += 1 if num == candidate else -1\n    return candidate"}, {"id": 75, "title": "颜色分类", "difficulty": "中等", "category": "技巧", "tags": "双指针 排序 数组", "link": "https://leetcode.cn/problems/sort-colors/", "hint": "荷兰国旗问题：三指针，把 0 换到前面，2 换到后面，1 自然在中间。", "solution_name": "三指针（荷兰国旗）", "time_complexity": "O(n)", "space_complexity": "O(1)", "solution": "三个指针：p0 指向下一个 0 应放的位置，p2 指向下一个 2 应放的位置，curr 遍历。\ncurr 遇到 0：与 p0 交换，p0++, curr++。\ncurr 遇到 2：与 p2 交换，p2--（curr 不动，因为换来的可能是 0）。\ncurr 遇到 1：curr++。", "code": "def sortColors(nums):\n    p0, curr, p2 = 0, 0, len(nums) - 1\n    while curr <= p2:\n        if nums[curr] == 0:\n            nums[p0], nums[curr] = nums[curr], nums[p0]\n            p0 += 1; curr += 1\n        elif nums[curr] == 2:\n            nums[curr], nums[p2] = nums[p2], nums[curr]\n            p2 -= 1\n        else:\n            curr += 1"}, {"id": 31, "title": "下一个排列", "difficulty": "中等", "category": "技巧", "tags": "数组 双指针", "link": "https://leetcode.cn/problems/next-permutation/", "hint": "从右往左找第一个下降的位置 i，再从右往左找第一个大于 nums[i] 的位置 j，交换后翻转 i+1 到末尾。", "solution_name": "三步法", "time_complexity": "O(n)", "space_complexity": "O(1)", "solution": "1) 从右往左找第一个 nums[i] < nums[i+1] 的位置 i。\n2) 从右往左找第一个 nums[j] > nums[i] 的位置 j，交换 nums[i] 和 nums[j]。\n3) 翻转 i+1 到末尾（使其变为最小排列）。\n如果步骤 1 找不到（整个数组降序），直接翻转整个数组。", "code": "def nextPermutation(nums):\n    n = len(nums)\n    i = n - 2\n    while i >= 0 and nums[i] >= nums[i+1]:\n        i -= 1\n    if i >= 0:\n        j = n - 1\n        while nums[j] <= nums[i]:\n            j -= 1\n        nums[i], nums[j] = nums[j], nums[i]\n    # 翻转 i+1 到末尾\n    left, right = i + 1, n - 1\n    while left < right:\n        nums[left], nums[right] = nums[right], nums[left]\n        left += 1; right -= 1"}, {"id": 287, "title": "寻找重复数", "difficulty": "中等", "category": "技巧", "tags": "双指针 位运算 二分查找", "link": "https://leetcode.cn/problems/find-the-duplicate-number/", "hint": "Floyd 判圈法：把数组看成链表（nums[i] 指向下一个节点），找环的入口。", "solution_name": "Floyd 判圈（快慢指针）", "time_complexity": "O(n)", "space_complexity": "O(1)", "solution": "将数组视为隐式链表：下标 i 的下一个节点是 nums[i]。\n因为有重复数，所以一定有环。用 Floyd 判圈法找环入口即为重复数。\n第一阶段：快慢指针找相遇点。第二阶段：一个从起点，一个从相遇点，同速走到入口。", "code": "def findDuplicate(nums):\n    slow = fast = nums[0]\n    while True:\n        slow = nums[slow]\n        fast = nums[nums[fast]]\n        if slow == fast:\n            break\n    slow = nums[0]\n    while slow != fast:\n        slow = nums[slow]\n        fast = nums[fast]\n    return slow"}]};
