      <span class="filter-chip ${diffFilter==='easy'?'active':''}" onclick="diffFilter='easy';renderAll()">简单</span>
      <span class="filter-chip ${diffFilter==='medium'?'active':''}" onclick="diffFilter='medium';renderAll()">中等</span>
      <span class="filter-chip ${diffFilter==='hard'?'active':''}" onclick="diffFilter='hard';renderAll()">困难</span>
      <span class="filter-chip ${diffFilter==='undone'?'active':''}" onclick="diffFilter='undone';renderAll()">未完成</span>
    </div>`;

  let fl = PROBLEMS;
  if (diffFilter === 'easy') fl = fl.filter(p => p.difficulty === '简单');
  if (diffFilter === 'medium') fl = fl.filter(p => p.difficulty === '中等');
  if (diffFilter === 'hard') fl = fl.filter(p => p.difficulty === '困难');
  if (diffFilter === 'undone') fl = fl.filter(p => !isDone(p.id));
  if (query.trim()) {
    const q = query.toLowerCase();
    fl = fl.filter(p => p.title.toLowerCase().includes(q) || String(p.id).includes(q) || p.category.toLowerCase().includes(q) || (p.tags||'').toLowerCase().includes(q));
  }

  if (!fl.length) {
    h += `<div class="empty"><div class="emoji">🔍</div><p>没有找到匹配的题目</p></div>`;
  } else {
    h += `<div class="problem-list">`;
    fl.forEach(p => { h += pItemHTML(p); });
    h += '</div>';
  }
  h += '</div>';
  app.innerHTML = h;
}

function pItemHTML(p) {
  const done = isDone(p.id);
  const dc = p.difficulty === '简单' ? 'easy' : p.difficulty === '中等' ? 'medium' : 'hard';
  return `<div class="p-item" onclick="curCat='${esc(p.category)}';navigate('detail',${p.id})">
    <div class="p-check ${done?'done':''}" onclick="event.stopPropagation();toggleDone(${p.id});render()">${done?'✓':''}</div>
    <div class="p-body">

function renderStats() {
  pageTitle.textContent = '刷题统计';
  backBtn.classList.remove('show');
  const pr = loadP(), done = doneCount(), total = PROBLEMS.length, pct = total ? (done/total*100).toFixed(1) : 0;

  let h = `<div class="stats-page fade-up">
    <div class="hero-card" style="margin:0 0 16px">
      <div class="hero-top"><span class="hero-label">总进度</span><span class="hero-pct">${done} / ${total}</span></div>
      <div class="hero-bar"><div class="hero-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="section-label" style="padding-left:0">按难度</div>`;

  [['简单','--green'],['中等','--yellow'],['困难','--red']].forEach(([d,c]) => {
    const ps = PROBLEMS.filter(p=>p.difficulty===d);
    const dn = ps.filter(p=>pr[p.id]).length, tt = ps.length, pp = tt ? (dn/tt*100) : 0;
    h += `<div class="stats-card">
      <div class="stats-row"><span class="stats-label" style="color:var(${c})">${d}</span><span class="stats-value">${dn} / ${tt}</span></div>
      <div class="stats-bar"><div class="stats-bar-fill" style="width:${pp}%;background:var(${c})"></div></div>
    </div>`;
  });

  h += `<div class="section-label" style="padding-left:0;margin-top:4px">按分类</div>`;
  const colors = ['#6366f1','#06b6d4','#a855f7','#f97316','#22c55e','#ec4899'];
  CATEGORIES.forEach((cat, i) => {
    const d = catDone(cat), t = catTotal(cat), p = t ? (d/t*100) : 0;
    const clr = colors[i % colors.length];
    h += `<div class="stats-card">
      <div class="stats-row"><span class="stats-label">${CAT_ICONS[cat]||''} ${cat}</span><span class="stats-value">${d} / ${t}</span></div>
      <div class="stats-bar"><div class="stats-bar-fill" style="width:${p}%;background:${clr}"></div></div>
    </div>`;
  });

  h += `<button class="reset-btn" onclick="resetAll()">重置所有进度</button></div>`;
  app.innerHTML = h;
}

//  AI Chat
// ═══════════════════════════════════════════════════════
const AK = 'lc100_apikey';
const AI_SVC = 'lc100_ai_service';
let aiMessages = [];
let aiStreaming = false;
let aiProblem = null;

const AI_SERVICES = [
  { id: 'deepseek', name: 'DeepSeek', url: 'https://chat.deepseek.com' },
  { id: 'yuanbao', name: '元宝', url: 'https://yuanbao.tencent.com/chat' },
  { id: 'kimi', name: 'Kimi', url: 'https://kimi.moonshot.cn' },
  { id: 'doubao', name: '豆包', url: 'https://www.doubao.com/chat' },
  { id: 'tongyi', name: '通义千问', url: 'https://tongyi.aliyun.com/qianwen' },
  { id: 'chatgpt', name: 'ChatGPT', url: 'https://chatgpt.com' },
];

function getApiKey() { return localStorage.getItem(AK) || ''; }
function setApiKey(k) { if (k) localStorage.setItem(AK, k); else localStorage.removeItem(AK); }
function getAiService() { return localStorage.getItem(AI_SVC) || 'deepseek'; }
function setAiService(s) { localStorage.setItem(AI_SVC, s); }

function buildSystemPrompt(p) {
  return `你是一个 LeetCode 算法辅导助手。当前题目是：

题号: ${p.id}
题名: ${p.title}
难度: ${p.difficulty}
分类: ${p.category}
标签: ${p.tags}
链接: ${p.link}

参考解法 (${p.solution_name}):
${p.solution}

参考代码:
${p.code}

时间复杂度: ${p.time_complexity}
空间复杂度: ${p.space_complexity}

请基于以上信息回答用户的问题。请用中文回答，解释要清晰易懂。如果用户问的是思路相关问题，先引导思考再给出答案。代码用 Python。`;
}

function buildUserPrompt(p) {
  return `我正在做 LeetCode #${p.id}「${p.title}」（${p.difficulty} / ${p.category}）

请帮我理解这道题的解题思路，包括：
1. 题目的核心考察点是什么？
2. 为什么用「${p.solution_name}」这个方法？
3. 关键步骤和边界情况有哪些？`;
}

function openAI(pid) {
  aiProblem = PROBLEMS.find(x => x.id === pid);
  if (!aiProblem) return;
  aiMessages = [];

  const hasKey = !!getApiKey();
  if (hasKey) {
    openApiChat();
  } else {
    openFreeChat();
  }
}

// ── 免费模式：复制 prompt + 跳转 ──
function openFreeChat() {
  const p = aiProblem;
  const prompt = buildUserPrompt(p);

  let servicesHTML = '';
  AI_SERVICES.forEach(s => {
    servicesHTML += `<button class="ai-service-btn" onclick="copyAndJump('${s.id}')">${s.name} ↗</button>`;
  });

  const chatHTML = `<div class="ai-chat" id="aiChat">
    <div class="ai-chat-header">
      <button class="ai-back" onclick="closeAI()">‹</button>
      <h2>AI 问答 · #${p.id} ${esc(p.title)}</h2>
      <span class="ai-mode-tag ai-mode-free">免费</span>
    </div>
    <div class="ai-free-panel" style="flex:1;overflow-y:auto">
      <div class="ai-msg system" style="max-width:100%;text-align:left;padding:12px 0">
        已为你生成针对本题的 prompt，复制后跳转到任意 AI 助手即可开始对话。
      </div>
      <div class="prompt-preview" id="promptPreview">${esc(prompt)}</div>
      <button class="copy-prompt-btn" id="copyBtn" onclick="copyPrompt()">📋 复制 Prompt</button>
      <div class="section-label" style="padding:16px 0 8px;font-size:12px">选择 AI 服务（复制并跳转）</div>
      <div class="ai-services">${servicesHTML}</div>
      <div class="ai-msg system" style="max-width:100%;text-align:center;padding:16px 0 0">
        💡 在设置中填入 DeepSeek API Key 可解锁应用内直接对话
      </div>
    </div>
  </div>`;

  document.body.insertAdjacentHTML('beforeend', chatHTML);
}

function copyPrompt() {
  const prompt = buildUserPrompt(aiProblem);
  navigator.clipboard.writeText(prompt).then(() => {
    const btn = $('copyBtn');
    btn.textContent = '✅ 已复制！';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 复制 Prompt'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    // Fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = prompt; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = $('copyBtn');
    btn.textContent = '✅ 已复制！'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 复制 Prompt'; btn.classList.remove('copied'); }, 2000);
  });
}

function copyAndJump(serviceId) {
  const svc = AI_SERVICES.find(s => s.id === serviceId);
  const prompt = buildUserPrompt(aiProblem);
  navigator.clipboard.writeText(prompt).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = prompt; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  });
  window.open(svc.url, '_blank');
}

// ── API 模式：应用内对话 ──
function openApiChat() {
  const p = aiProblem;
  aiMessages = [
    { role: 'system', content: buildSystemPrompt(p) },
  ];

  const chatHTML = `<div class="ai-chat" id="aiChat">
    <div class="ai-chat-header">
      <button class="ai-back" onclick="closeAI()">‹</button>
      <h2>AI 问答 · #${p.id} ${esc(p.title)}</h2>
      <span class="ai-mode-tag ai-mode-api">API</span>
    </div>
    <div class="ai-messages" id="aiMsgs">
      <div class="ai-msg system">已加载题目上下文，请随意提问</div>
    </div>
    <div class="ai-input-bar">
      <textarea id="aiInput" placeholder="输入你的问题…" rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAI()}"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
      <button class="ai-send-btn" id="aiSendBtn" onclick="sendAI()">↑</button>
    </div>
  </div>`;

  document.body.insertAdjacentHTML('beforeend', chatHTML);
  $('aiInput').focus();
}

async function sendAI() {
  if (aiStreaming) return;
  const input = $('aiInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = ''; input.style.height = 'auto';
  const msgs = $('aiMsgs');

  // Add user message
  aiMessages.push({ role: 'user', content: text });
  msgs.innerHTML += `<div class="ai-msg user">${esc(text)}</div>`;

  // Add typing indicator
  const typingId = 'typing_' + Date.now();
  msgs.innerHTML += `<div class="ai-msg ai" id="${typingId}"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
  msgs.scrollTop = msgs.scrollHeight;

  aiStreaming = true;
  $('aiSendBtn').disabled = true;

  try {
    const apiKey = getApiKey();
    const res = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: aiMessages,
        stream: true,
        max_tokens: 2048,
      }),
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error(`API 请求失败 (${res.status}): ${err}`);
    }

    // Stream response
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let aiText = '';
    const aiEl = $(typingId);

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value, { stream: true });
      const lines = chunk.split('\n').filter(l => l.startsWith('data: '));

      for (const line of lines) {
        const data = line.slice(6);
        if (data === '[DONE]') break;
        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content || '';
          aiText += delta;
          aiEl.textContent = aiText;
          msgs.scrollTop = msgs.scrollHeight;
        } catch {}
      }
    }

    aiMessages.push({ role: 'assistant', content: aiText });

  } catch (err) {
    const aiEl = $(typingId);
    aiEl.innerHTML = `<span style="color:var(--red)">⚠ ${esc(err.message)}</span>`;
  } finally {
    aiStreaming = false;
    $('aiSendBtn').disabled = false;
    $('aiInput')?.focus();
  }
}

function closeAI() {
  const el = $('aiChat');
  if (el) el.remove();
  aiMessages = [];
  aiStreaming = false;
}

// ═══════════════════════════════════════════════════════
//  Theme
// ═══════════════════════════════════════════════════════
const TK = 'lc100_theme';
function initTheme() {
  const saved = localStorage.getItem(TK);
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
  } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
    document.documentElement.setAttribute('data-theme', 'light');
  }
  updateThemeMeta();
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem(TK, next);
  updateThemeMeta();
}
function updateThemeMeta() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  document.querySelector('meta[name="theme-color"]').content = isLight ? '#f5f5f7' : '#0a0a0f';
}
initTheme();
