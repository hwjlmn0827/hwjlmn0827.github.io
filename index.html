async function sendAI() {
  if (aiStreaming) return;
  const input = $('aiInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = ''; input.style.height = 'auto';
  const msgs = $('aiMsgs');

  aiMessages.push({ role: 'user', content: text });
  msgs.innerHTML += `<div class="ai-msg user">${esc(text)}</div>`;

  const typingId = 'typing_' + Date.now();
  msgs.innerHTML += `<div class="ai-msg ai" id="${typingId}"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
  msgs.scrollTop = msgs.scrollHeight;

  aiStreaming = true;
  $('aiSendBtn').disabled = true;

  const provider = getActiveProviderObj();
  const apiKey = getProviderKey(provider.id);
  const model = getProviderModel(provider.id);

  try {
    let res;

    if (provider.format === 'anthropic') {
      // ── Anthropic Messages API ──
      const sysMsg = aiMessages.find(m => m.role === 'system');
      const userMsgs = aiMessages.filter(m => m.role !== 'system');
      res = await fetch(provider.endpoint, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model,
          system: sysMsg?.content || '',
          messages: userMsgs,
          stream: true,
          max_tokens: 2048,
        }),
      });
    } else {
      // ── OpenAI 兼容格式 ──
      res = await fetch(provider.endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
        body: JSON.stringify({
          model,
          messages: aiMessages,
          stream: true,
          max_tokens: 2048,
        }),
      });
    }

    if (!res.ok) {
      const err = await res.text();
      throw new Error(`API 请求失败 (${res.status}): ${err}`);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let aiText = '';
    const aiEl = $(typingId);

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value, { stream: true });
      const lines = chunk.split('\n').filter(l => l.startsWith('data: '));

      for (const line of lines) {
        const data = line.slice(6);
        if (data === '[DONE]') break;
        try {
          const json = JSON.parse(data);
          let delta = '';
          if (provider.format === 'anthropic') {
            // Anthropic SSE: event: content_block_delta
            delta = json.delta?.text || '';
          } else {
            delta = json.choices?.[0]?.delta?.content || '';
          }
          aiText += delta;
          aiEl.textContent = aiText;
          msgs.scrollTop = msgs.scrollHeight;
        } catch {}
      }
    }

    aiMessages.push({ role: 'assistant', content: aiText });

  } catch (err) {
    const aiEl = $(typingId);
    aiEl.innerHTML = `<span style="color:var(--red)">⚠ ${esc(err.message)}</span>`;
  } finally {
    aiStreaming = false;
    $('aiSendBtn').disabled = false;
    $('aiInput')?.focus();
  }
}

function closeAI() {
  const el = $('aiChat');
  if (el) el.remove();
  aiMessages = [];
  aiStreaming = false;
}

function renderSettings() {
  pageTitle.textContent = '设置';
  backBtn.classList.remove('show');

  const activeId = getActiveProvider();

  // 构建服务商选择器
  const providerTabs = AI_PROVIDERS.map(p => {
    const hasKey = !!getProviderKey(p.id);
    const isActive = p.id === activeId;
    return `<button class="provider-tab ${isActive?'active':''}" onclick="switchProvider('${p.id}')">
      <span>${p.icon}</span>
      <span>${p.name}</span>
      ${hasKey ? '<span class="provider-dot"></span>' : ''}
    </button>`;
  }).join('');

  // 构建当前服务商的配置面板
  function providerPanel(p) {
    const key = getProviderKey(p.id);
    const hasKey = !!key;
    const model = getProviderModel(p.id);
    return `
      <div class="setting-item">
        <div>
          <div class="s-label">${p.icon} ${p.name} API Key</div>
          <div class="s-desc">${p.keyHint}</div>
        </div>
        <span class="key-status ${hasKey?'active':'inactive'}">${hasKey?'已配置':'未配置'}</span>
      </div>
      <div class="setting-item" style="flex-direction:column;align-items:stretch;gap:8px">
        <input type="password" id="apiKeyInput_${p.id}" placeholder="${p.keyPlaceholder}"
          value="${esc(key)}" style="max-width:100%;width:100%"
          onfocus="this.type='text'" onblur="this.type='password'">
        <div style="display:flex;gap:8px">
          <button class="copy-prompt-btn" style="flex:1" onclick="saveProviderKey('${p.id}')">保存</button>
          <button class="copy-prompt-btn" style="flex:1;color:var(--red)" onclick="clearProviderKey('${p.id}')">清除</button>
        </div>
      </div>
      <div class="setting-item">
        <div>
          <div class="s-label">模型</div>
          <div class="s-desc">选择使用的模型版本</div>
        </div>
        <select onchange="setProviderModel('${p.id}', this.value)" style="max-width:180px">
          ${p.models.map(m => `<option value="${m}" ${model===m?'selected':''}>${m}</option>`).join('')}
        </select>
      </div>`;
  }

  const activeProvider = AI_PROVIDERS.find(p => p.id === activeId) || AI_PROVIDERS[2];

  let h = `<div class="settings-page fade-up">

    <div class="setting-group">
      <div class="setting-group-title">AI 问答助手</div>
      <div class="setting-item" style="flex-direction:column;align-items:stretch;gap:10px;padding-bottom:4px">
        <div class="s-label" style="font-size:12px;color:var(--text-tertiary)">选择 AI 服务商（配置 Key 后可应用内直接对话）</div>
        <div class="provider-tabs" id="providerTabs">${providerTabs}</div>
      </div>
      <div id="providerPanel">
        ${providerPanel(activeProvider)}
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-group-title">免费跳转模式</div>
      <div class="setting-item">
        <div>
          <div class="s-label">未配置 Key 时的默认跳转服务</div>
          <div class="s-desc">点击 AI 问答按钮时自动跳转</div>
        </div>
        <select onchange="setAiService(this.value)">
          ${AI_FREE_SERVICES.map(s => `<option value="${s.id}" ${getAiService()===s.id?'selected':''}>${s.name}</option>`).join('')}
        </select>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-group-title">关于</div>
      <div class="setting-item">
        <div class="s-label">LeetCode Hot 100 刷题助手</div>
        <span style="font-size:12px;color:var(--text-tertiary)">v3.0</span>
      </div>
      <div class="setting-item">
        <div>
          <div class="s-label">数据存储</div>
          <div class="s-desc">所有数据保存在本地 localStorage</div>
        </div>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-group-title">危险操作</div>
      <div class="setting-item">
        <div>
          <div class="s-label" style="color:var(--red)">重置所有进度</div>
          <div class="s-desc">清除全部刷题记录，不可撤销</div>
        </div>
        <button class="reset-btn" style="width:auto;margin:0;padding:8px 16px;font-size:12px" onclick="resetAll();render()">重置</button>
      </div>
    </div>
  </div>`;

  app.innerHTML = h;
}

function switchProvider(pid) {
  setActiveProvider(pid);
  renderSettings();
}

function saveProviderKey(pid) {
  const input = $('apiKeyInput_' + pid);
  if (!input) return;
  setProviderKey(pid, input.value.trim());
  renderSettings();
}

function clearProviderKey(pid) {
  setProviderKey(pid, '');
  renderSettings();
}

// 向后兼容旧版
function saveApiKey() { saveProviderKey(getActiveProvider()); }
function clearApiKey() { clearProviderKey(getActiveProvider()); }

// ═══════════════════════════════════════════════════════
//  Theme
// ═══════════════════════════════════════════════════════
const TK = 'lc100_theme';
function initTheme() {
  const saved = localStorage.getItem(TK);
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
  } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
    document.documentElement.setAttribute('data-theme', 'light');
  }
  updateThemeMeta();
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem(TK, next);
  updateThemeMeta();
}
function updateThemeMeta() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  document.querySelector('meta[name="theme-color"]').content = isLight ? '#f5f5f7' : '#0a0a0f';
}
initTheme();

// ═══════════════════════════════════════════════════════
//  PWA Registration
// ═══════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    // 检测到新 SW 时立即激活并刷新
    reg.addEventListener('updatefound', () => {
      const newSW = reg.installing;
      if (newSW) {
        newSW.addEventListener('statechange', () => {
          if (newSW.state === 'activated' && navigator.serviceWorker.controller) {
            window.location.reload();
          }
        });
      }
    });
    // 每次打开页面都检查更新
    reg.update().catch(() => {});
  }).catch(() => {});
}

// ═══════════════════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════════════════
render();
</script>
