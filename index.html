culty": "困难","category": "栈","tags": "单调栈 数组","link": "https://leetcode.cn/problems/largest-rectangle-in-histogram/","hint": "单调递增栈：对每个柱子找到左右第一个比它矮的位置，宽度 × 高度就是面积。","solution_name": "单调栈","time_complexity": "O(n)","space_complexity": "O(n)","solution": "维护单调递增栈（存下标）。遍历柱子：\n当栈非空且当前高度 < 栈顶高度时，弹出栈顶 h，\n宽度 = i - stack[-1] - 1（如果栈空则宽度为 i）。\n面积 = h × 宽度，更新最大值。最后在数组末尾加一个 0 确保所有柱子被处理。","code": "var largestRectangleArea = function(heights) {\n    const stack = [-1];\n    let maxArea = 0;\n    for (let i = 0; i <= heights.length; i++) {\n        const h = i === heights.length ? 0 : heights[i];\n        while (stack.length > 1 && h < heights[stack[stack.length - 1]]) {\n            const height = heights[stack.pop()];\n            const width = i - stack[stack.length - 1] - 1;\n            maxArea = Math.max(maxArea, height * width);\n        }\n        stack.push(i);\n    }\n    return maxArea;\n};"},{"id": 215,"title": "数组中的第 K 个最大元素","difficulty": "中等","category": "堆","tags": "堆 快速选择 排序","link": "https://leetcode.cn/problems/kth-largest-element-in-an-array/","hint": "用大小为 k 的最小堆，或者快速选择算法。","solution_name": "最小堆","time_complexity": "O(n log k)","space_complexity": "O(k)","solution": "维护一个大小为 k 的最小堆。遍历数组，每个元素入堆，\n如果堆大小超过 k 就弹出堆顶（最小值）。\n遍历结束后堆顶就是第 k 大的元素。","code": "var findKthLargest = function(nums, k) {\n    const quickSelect = (l, r, k) => {\n        const pivot = nums[r];\n        let p = l;\n        for (let i = l; i < r; i++) {\n            if (nums[i] >= pivot) { [nums[i], nums[p]] = [nums[p], nums[i]]; p++; }\n        }\n        [nums[p], nums[r]] = [nums[r], nums[p]];\n        if (p === k - 1) return nums[p];\n        return p < k - 1 ? quickSelect(p + 1, r, k) : quickSelect(l, p - 1, k);\n    };\n    return quickSelect(0, nums.length - 1, k);\n};"},{"id": 347,"title": "前 K 个高频元素","difficulty": "中等","category": "堆","tags": "堆 哈希表 桶排序","link": "https://leetcode.cn/problems/top-k-frequent-elements/","hint": "先统计频次，然后用大小为 k 的最小堆维护前 k 高频元素。","solution_name": "哈希表 + 最小堆","time_complexity": "O(n log k)","space_complexity": "O(n)","solution": "先用 Counter 统计每个元素的频次。\n然后用大小为 k 的最小堆，按频次维护前 k 个高频元素。\n也可以用桶排序：频次作为下标，O(n) 时间。","code": "var topKFrequent = function(nums, k) {\n    const freq = new Map();\n    for (const n of nums) freq.set(n, (freq.get(n) || 0) + 1);\n    const buckets = Array.from({length: nums.length + 1}, () => []);\n    for (const [num, count] of freq) buckets[count].push(num);\n    const result = [];\n    for (let i = buckets.length - 1; i >= 0 && result.length < k; i--) {\n        result.push(...buckets[i]);\n    }\n    return result.slice(0, k);\n};"},{"id": 295,"title": "数据流的中位数","difficulty": "困难","category": "堆","tags": "堆 设计 排序","link": "https://leetcode.cn/problems/find-median-from-data-stream/","hint": "用一个最大堆存较小的一半，一个最小堆存较大的一半，保持两堆大小平衡。","solution_name": "对顶堆","time_complexity": "O(log n)（addNum），O(1)（findMedian）","space_complexity": "O(n)","solution": "max_heap 存较小的一半（取反模拟最大堆），min_heap 存较大的一半。\naddNum：先加入 max_heap，再将 max_heap 堆顶移到 min_heap，\n如果 min_heap 更大则移回一个。保持 max_heap 大小 >= min_heap。\nfindMedian：如果两堆大小相等取平均，否则取 max_heap 堆顶。","code": "class MedianFinder {\n    constructor() { this.nums = []; }\n    addNum(num) {\n        let l = 0, r = this.nums.length;\n        while (l < r) { const mid = (l + r) >> 1; if (this.nums[mid] < num) l = mid + 1; else r = mid; }\n        this.nums.splice(l, 0, num);\n    }\n    findMedian() {\n        const n = this.nums.length, mid = n >> 1;\n        return n % 2 ? this.nums[mid] : (this.nums[mid - 1] + this.nums[mid]) / 2;\n    }\n}"},{"id": 121,"title": "买卖股票的最佳时机","difficulty": "简单","category": "贪心","tags": "贪心 数组 动态规划","link": "https://leetcode.cn/problems/best-time-to-buy-and-sell-stock/","hint": "遍历时维护到目前为止的最低价格，每天计算如果今天卖出的利润。","solution_name": "一次遍历","time_complexity": "O(n)","space_complexity": "O(1)","solution": "维护 min_price 记录到目前为止的最低价格。\n对于每天的价格，计算 price - min_price 作为今天卖出的利润，更新最大利润。\n同时更新 min_price。","code": "var maxProfit = function(prices) {\n    let minPrice = Infinity, maxProfit = 0;\n    for (const price of prices) {\n        minPrice = Math.min(minPrice, price);\n        maxProfit = Math.max(maxProfit, price - minPrice);\n    }\n    return maxProfit;\n};"},{"id": 55,"title": "跳跃游戏","difficulty": "中等","category": "贪心","tags": "贪心 数组","link": "https://leetcode.cn/problems/jump-game/","hint": "维护能到达的最远位置 max_reach，如果某个位置超过 max_reach 则无法到达。","solution_name": "贪心","time_complexity": "O(n)","space_complexity": "O(1)","solution": "维护 max_reach 表示当前能到达的最远位置。\n遍历数组，如果当前位置 i > max_reach，说明无法到达，返回 False。\n否则更新 max_reach = max(max_reach, i + nums[i])。\n如果 max_reach >= n-1，返回 True。","code": "var canJump = function(nums) {\n    let maxReach = 0;\n    for (let i = 0; i < nums.length; i++) {\n        if (i > maxReach) return false;\n        maxReach = Math.max(maxReach, i + nums[i]);\n    }\n    return true;\n};"},{"id": 45,"title": "跳跃游戏 II","difficulty": "中等","category": "贪心","tags": "贪心 数组","link": "https://leetcode.cn/problems/jump-game-ii/","hint": "贪心：在当前跳跃范围内，找到能跳最远的位置作为下一跳的起点。","solution_name": "贪心","time_complexity": "O(n)","space_complexity": "O(1)","solution": "维护 end（当前跳跃的边界）和 farthest（当前范围内能到的最远位置）。\n遍历数组，更新 farthest。当 i == end 时，必须跳一步，steps++，end = farthest。","code": "var jump = function(nums) {\n    let jumps = 0, curEnd = 0, farthest = 0;\n    for (let i = 0; i < nums.length - 1; i++) {\n        farthest = Math.max(farthest, i + nums[i]);\n        if (i === curEnd) { jumps++; curEnd = farthest; }\n    }\n    return jumps;\n};"},{"id": 763,"title": "划分字母区间","difficulty": "中等","category": "贪心","tags": "贪心 哈希表 字符串","link": "https://leetcode.cn/problems/partition-labels/","hint": "记录每个字母最后出现的位置，遍历时维护当前区间的最远边界。","solution_name": "贪心","time_complexity": "O(n)","space_complexity": "O(1)","solution": "先遍历一遍记录每个字母最后出现的位置 last[ch]。\n再遍历字符串，维护当前区间的右边界 end = max(end, last[s[i]])。\n当 i == end 时，说明当前区间内的所有字母都不会出现在后面，记录区间长度。","code": "var partitionLabels = function(s) {\n    const last = {};\n    for (let i = 0; i < s.length; i++) last[s[i]] = i;\n    const result = [];\n    let start = 0, end = 0;\n    for (let i = 0; i < s.length; i++) {\n        end = Math.max(end, last[s[i]]);\n        if (i === end) { result.push(end - start + 1); start = end + 1; }\n    }\n    return result;\n};"},{"id": 70,"title": "爬楼梯","difficulty": "简单","category": "动态规划","tags": "动态规划 记忆化","link": "https://leetcode.cn/problems/climbing-stairs/","hint": "dp[i] = dp[i-1] + dp[i-2]，就是斐波那契数列。","solution_name": "动态规划","time_complexity": "O(n)","space_complexity": "O(1)","solution": "到第 i 阶的方法数 = 到第 i-1 阶 + 到第 i-2 阶（最后一步走 1 阶或 2 阶）。\n就是斐波那契数列。只需两个变量滚动即可。","code": "var climbStairs = function(n) {\n    if (n <= 2) return n;\n    let a = 1, b = 2;\n    for (let i = 3; i <= n; i++) [a, b] = [b, a + b];\n    return b;\n};"},{"id": 118,"title": "杨辉三角","difficulty": "简单","category": "动态规划","tags": "动态规划 数组","link": "https://leetcode.cn/problems/pascals-triangle/","hint": "每行的每个元素 = 上一行的左上 + 正上。","solution_name": "逐行构建","time_complexity": "O(n²)","space_complexity": "O(n²)","solution": "逐行构建：每行首尾为 1，中间元素 = 上一行 [j-1] + [j]。","code": "var generate = function(numRows) {\n    const result = [[1]];\n    for (let i = 1; i < numRows; i++) {\n        const prev = result[i - 1];\n        const row = [1];\n        for (let j = 1; j < i; j++) row.push(prev[j - 1] + prev[j]);\n        row.push(1);\n        result.push(row);\n    }\n    return result;\n};"},{"id": 198,"title": "打家劫舍","difficulty": "中等","category": "动态规划","tags": "动态规划 数组","link": "https://leetcode.cn/problems/house-robber/","hint": "dp[i] = max(dp[i-1], dp[i-2] + nums[i])，偷或不偷当前房子。","solution_name": "动态规划","time_complexity": "O(n)","space_complexity": "O(1)","solution": "对于每间房子，选择偷或不偷：\n偷：dp[i-2] + nums[i]（不能偷相邻的）。\n不偷：dp[i-1]。\ndp[i] = max(dp[i-1], dp[i-2] + nums[i])。用两个变量滚动。","code": "var rob = function(nums) {\n    let prev = 0, curr = 0;\n    for (const num of nums) [prev, curr] = [curr, Math.max(curr, prev + num)];\n    return curr;\n};"},{"id": 279,"title": "完全平方数","difficulty": "中等","category": "动态规划","tags": "动态规划 BFS 数学","link": "https://leetcode.cn/problems/perfect-squares/","hint": "dp[i] = min(dp[i - j*j] + 1)，其中 j*j <= i。","solution_name": "动态规划","time_complexity": "O(n√n)","space_complexity": "O(n)","solution": "dp[i] 表示组成 i 的最少完全平方数个数。\n对于每个 i，遍历所有 j 使得 j*j <= i，dp[i] = min(dp[i], dp[i-j*j] + 1)。\n初始 dp[0] = 0。","code": "var numSquares = function(n) {\n    const dp = new Array(n + 1).fill(Infinity);\n    dp[0] = 0;\n    for (let i = 1; i <= n; i++) {\n        for (let j = 1; j * j <= i; j++) {\n            dp[i] = Math.min(dp[i], dp[i - j * j] + 1);\n        }\n    }\n    return dp[n];\n};"},{"id": 322,"title": "零钱兑换","difficulty": "中等","category": "动态规划","tags": "动态规划 BFS","link": "https://leetcode.cn/problems/coin-change/","hint": "dp[i] = min(dp[i - coin] + 1)，遍历所有硬币面值。","solution_name": "动态规划","time_complexity": "O(amount × n)","space_complexity": "O(amount)","solution": "dp[i] 表示凑成金额 i 的最少硬币数。\n对于每个金额 i，遍历所有硬币 coin，dp[i] = min(dp[i], dp[i-coin] + 1)。\n初始 dp[0] = 0，其余为 inf。如果 dp[amount] 仍为 inf 则返回 -1。","code": "var coinChange = function(coins, amount) {\n    const dp = new Array(amount + 1).fill(Infinity);\n    dp[0] = 0;\n    for (let i = 1; i <= amount; i++) {\n        for (const coin of coins) {\n            if (coin <= i) dp[i] = Math.min(dp[i], dp[i - coin] + 1);\n        }\n    }\n    return dp[amount] === Infinity ? -1 : dp[amount];\n};"},{"id": 139,"title": "单词拆分","difficulty": "中等","category": "动态规划","tags": "动态规划 字符串 哈希表","link": "https://leetcode.cn/problems/word-break/","hint": "dp[i] 表示 s[:i] 能否被拆分。dp[i] = any(dp[j] and s[j:i] in wordDict)。","solution_name": "动态规划","time_complexity": "O(n²)","space_complexity": "O(n)","solution": "dp[i] 表示 s 的前 i 个字符能否被拆分。\n对于每个 i，遍历 j (0 到 i-1)，如果 dp[j] 为 True 且 s[j:i] 在字典中，则 dp[i] = True。\n初始 dp[0] = True（空字符串）。","code": "var wordBreak = function(s, wordDict) {\n    const set = new Set(wordDict);\n    const dp = new Array(s.length + 1).fill(false);\n    dp[0] = true;\n    for (let i = 1; i <= s.length; i++) {\n        for (let j = 0; j < i; j++) {\n            if (dp[j] && set.has(s.slice(j, i))) { dp[i] = true; break; }\n        }\n    }\n    return dp[s.length];\n};"},{"id": 300,"title": "最长递增子序列","difficulty": "中等","category": "动态规划","tags": "动态规划 二分查找 贪心","link": "https://leetcode.cn/problems/longest-increasing-subsequence/","hint": "O(n²) DP 或 O(n log n) 贪心+二分：维护一个 tails 数组，用二分查找更新。","solution_name": "贪心 + 二分查找","time_complexity": "O(n log n)","space_complexity": "O(n)","solution": "维护 tails 数组，tails[i] 表示长度为 i+1 的递增子序列的最小末尾元素。\n遍历 nums，用二分查找在 tails 中找到第一个 >= num 的位置：\n如果找到则替换，否则追加。最终 tails 的长度就是 LIS 长度。","code": "var lengthOfLIS = function(nums) {\n    const tails = [];\n    for (const num of nums) {\n        let l = 0, r = tails.length;\n        while (l < r) { const mid = (l + r) >> 1; if (tails[mid] < num) l = mid + 1; else r = mid; }\n        tails[l] = num;\n    }\n    return tails.length;\n};"},{"id": 152,"title": "乘积最大子数组","difficulty": "中等","category": "动态规划","tags": "动态规划 数组","link": "https://leetcode.cn/problems/maximum-product-subarray/","hint": "同时维护以当前元素结尾的最大乘积和最小乘积（负数翻转）。","solution_name": "动态规划","time_complexity": "O(n)","space_complexity": "O(1)","solution": "因为负数 × 负数 = 正数，所以需要同时维护最大值和最小值。\n对于每个元素：new_max = max(num, max_val*num, min_val*num)，\nnew_min = min(num, max_val*num, min_val*num)。\n更新全局最大值。","code": "var maxProduct = function(nums) {\n    let maxP = nums[0], minP = nums[0], result = nums[0];\n    for (let i = 1; i < nums.length; i++) {\n        if (nums[i] < 0) [maxP, minP] = [minP, maxP];\n        maxP = Math.max(nums[i], maxP * nums[i]);\n        minP = Math.min(nums[i], minP * nums[i]);\n        result = Math.max(result, maxP);\n    }\n    return result;\n};"},{"id": 416,"title": "分割等和子集","difficulty": "中等","category": "动态规划","tags": "动态规划 背包","link": "https://leetcode.cn/problems/partition-equal-subset-sum/","hint": "转化为 0-1 背包问题：能否从数组中选出若干数使其和等于 total/2。","solution_name": "0-1 背包","time_complexity": "O(n × target)","space_complexity": "O(target)","solution": "总和为奇数直接返回 False。target = sum // 2。\ndp[j] 表示能否凑出和为 j。遍历每个数 num，从 target 到 num 倒序更新：\ndp[j] = dp[j] or dp[j - num]。","code": "var canPartition = function(nums) {\n    const sum = nums.reduce((a, b) => a + b, 0);\n    if (sum % 2) return false;\n    const target = sum / 2;\n    const dp = new Array(target + 1).fill(false);\n    dp[0] = true;\n    for (const num of nums) {\n        for (let j = target; j >= num; j--) {\n            dp[j] = dp[j] || dp[j - num];\n        }\n    }\n    return dp[target];\n};"},{"id": 32,"title": "最长有效括号","difficulty": "困难","category": "动态规划","tags": "动态规划 栈 字符串","link": "https://leetcode.cn/problems/longest-valid-parentheses/","hint": "dp[i] 表示以 s[i] 结尾的最长有效括号长度。只有 s[i] == ')' 时才可能非零。","solution_name": "动态规划","time_complexity": "O(n)","space_complexity": "O(n)","solution": "dp[i] 表示以 s[i] 结尾的最长有效括号长度。\n如果 s[i] == ')' 且 s[i-1] == '('，则 dp[i] = dp[i-2] + 2。\n如果 s[i] == ')' 且 s[i-1] == ')' 且 s[i-dp[i-1]-1] == '('，\n则 dp[i] = dp[i-1] + 2 + dp[i-dp[i-1]-2]。","code": "var longestValidParentheses = function(s) {\n    const stack = [-1];\n    let maxLen = 0;\n    for (let i = 0; i < s.length; i++) {\n        if (s[i] === '(') stack.push(i);\n        else {\n            stack.pop();\n            if (!stack.length) stack.push(i);\n            else maxLen = Math.max(maxLen, i - stack[stack.length - 1]);\n        }\n    }\n    return maxLen;\n};"},{"id": 62,"title": "不同路径","difficulty": "中等","category": "多维动态规划","tags": "动态规划 数学 组合","link": "https://leetcode.cn/problems/unique-paths/","hint": "dp[i][j] = dp[i-1][j] + dp[i][j-1]，只能向右或向下走。","solution_name": "动态规划","time_complexity": "O(m × n)","space_complexity": "O(n)","solution": "dp[i][j] 表示到达 (i,j) 的路径数。\n只能从上方或左方到达：dp[i][j] = dp[i-1][j] + dp[i][j-1]。\n可以用一维数组滚动优化空间。","code": "var uniquePaths = function(m, n) {\n    const dp = new Array(n).fill(1);\n    for (let i = 1; i < m; i++) {\n        for (let j = 1; j < n; j++) dp[j] += dp[j - 1];\n    }\n    return dp[n - 1];\n};"},{"id": 64,"title": "最小路径和","difficulty": "中等","category": "多维动态规划","tags": "动态规划 矩阵","link": "https://leetcode.cn/problems/minimum-path-sum/","hint": "dp[i][j] = grid[i][j] + min(dp[i-1][j], dp[i][j-1])。","solution_name": "动态规划","time_complexity": "O(m × n)","space_complexity": "O(n)","solution": "dp[i][j] 表示到达 (i,j) 的最小路径和。\ndp[i][j] = grid[i][j] + min(上方, 左方)。\n第一行和第一列只有一个方向，需要特殊处理。","code": "var minPathSum = function(grid) {\n    const m = grid.length, n = grid[0].length;\n    for (let i = 0; i < m; i++) {\n        for (let j = 0; j < n; j++) {\n            if (i === 0 && j === 0) continue;\n            else if (i === 0) grid[i][j] += grid[i][j - 1];\n            else if (j === 0) grid[i][j] += grid[i - 1][j];\n            else grid[i][j] += Math.min(grid[i - 1][j], grid[i][j - 1]);\n        }\n    }\n    return grid[m - 1][n - 1];\n};"},{"id": 5,"title": "最长回文子串","difficulty": "中等","category": "多维动态规划","tags": "动态规划 字符串 中心扩展","link": "https://leetcode.cn/problems/longest-palindromic-substring/","hint": "中心扩展法：以每个字符（和每两个相邻字符）为中心向两边扩展。","solution_name": "中心扩展","time_complexity": "O(n²)","space_complexity": "O(1)","solution": "遍历每个位置作为回文中心，分别考虑奇数长度和偶数长度。\n从中心向两边扩展，直到字符不匹配。记录最长的回文子串。","code": "var longestPalindrome = function(s) {\n    let start = 0, maxLen = 1;\n    const expand = (l, r) => {\n        while (l >= 0 && r < s.length && s[l] === s[r]) { l--; r++; }\n        if (r - l - 1 > maxLen) { start = l + 1; maxLen = r - l - 1; }\n    };\n    for (let i = 0; i < s.length; i++) { expand(i, i); expand(i, i + 1); }\n    return s.slice(start, start + maxLen);\n};"},{"id": 1143,"title": "最长公共子序列","difficulty": "中等","category": "多维动态规划","tags": "动态规划 字符串","link": "https://leetcode.cn/problems/longest-common-subsequence/","hint": "dp[i][j] 表示 text1[:i] 和 text2[:j] 的 LCS 长度。字符相等则 +1，否则取 max。","solution_name": "二维 DP","time_complexity": "O(m × n)","space_complexity": "O(m × n)","solution": "dp[i][j] 表示 text1 前 i 个字符和 text2 前 j 个字符的 LCS 长度。\n如果 text1[i-1] == text2[j-1]，dp[i][j] = dp[i-1][j-1] + 1。\n否则 dp[i][j] = max(dp[i-1][j], dp[i][j-1])。","code": "var longestCommonSubsequence = function(text1, text2) {\n    const m = text1.length, n = text2.length;\n    const dp = Array.from({length: m + 1}, () => new Array(n + 1).fill(0));\n    for (let i = 1; i <= m; i++) {\n        for (let j = 1; j <= n; j++) {\n            if (text1[i - 1] === text2[j - 1]) dp[i][j] = dp[i - 1][j - 1] + 1;\n            else dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);\n        }\n    }\n    return dp[m][n];\n};"},{"id": 72,"title": "编辑距离","difficulty": "中等","category": "多维动态规划","tags": "动态规划 字符串","link": "https://leetcode.cn/problems/edit-distance/","hint": "dp[i][j] 表示 word1[:i] 转换为 word2[:j] 的最少操作数。三种操作对应三个转移。","solution_name": "二维 DP","time_complexity": "O(m × n)","space_complexity": "O(m × n)","solution": "dp[i][j] 表示 word1 前 i 个字符变成 word2 前 j 个字符的最少操作数。\n如果 word1[i-1] == word2[j-1]，dp[i][j] = dp[i-1][j-1]（不需要操作）。\n否则 dp[i][j] = 1 + min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1])，\n分别对应删除、插入、替换。","code": "var minDistance = function(word1, word2) {\n    const m = word1.length, n = word2.length;\n    const dp = Array.from({length: m + 1}, (_, i) => new Array(n + 1).fill(0));\n    for (let i = 0; i <= m; i++) dp[i][0] = i;\n    for (let j = 0; j <= n; j++) dp[0][j] = j;\n    for (let i = 1; i <= m; i++) {\n        for (let j = 1; j <= n; j++) {\n            if (word1[i - 1] === word2[j - 1]) dp[i][j] = dp[i - 1][j - 1];\n            else dp[i][j] = 1 + Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]);\n        }\n    }\n    return dp[m][n];\n};"},{"id": 136,"title": "只出现一次的数字","difficulty": "简单","category": "技巧","tags": "位运算 数组","link": "https://leetcode.cn/problems/single-number/","hint": "异或运算：a ^ a = 0，a ^ 0 = a。所有数异或一遍，成对的抵消，剩下的就是答案。","solution_name": "异或","time_complexity": "O(n)","space_complexity": "O(1)","solution": "利用异或性质：x ^ x = 0，x ^ 0 = x。\n将所有数字异或一遍，出现两次的数字互相抵消为 0，最终结果就是只出现一次的数字。","code": "var singleNumber = function(nums) {\n    return nums.reduce((a, b) => a ^ b, 0);\n};"},{"id": 169,"title": "多数元素","difficulty": "简单","category": "技巧","tags": "数组 哈希表 投票","link": "https://leetcode.cn/problems/majority-element/","hint": "Boyer-Moore 投票算法：维护候选人和计数，遇到相同的 +1，不同的 -1，归零时换候选人。","solution_name": "Boyer-Moore 投票","time_complexity": "O(n)","space_complexity": "O(1)","solution": "维护候选人 candidate 和计数 count。\n遍历数组：count == 0 时更换候选人；当前数 == candidate 则 count++，否则 count--。\n多数元素一定是最终的候选人（因为它出现次数 > n/2）。","code": "var majorityElement = function(nums) {\n    let candidate = 0, count = 0;\n    for (const num of nums) {\n        if (count === 0) candidate = num;\n        count += num === candidate ? 1 : -1;\n    }\n    return candidate;\n};"},{"id": 75,"title": "颜色分类","difficulty": "中等","category": "技巧","tags": "双指针 排序 数组","link": "https://leetcode.cn/problems/sort-colors/","hint": "荷兰国旗问题：三指针，把 0 换到前面，2 换到后面，1 自然在中间。","solution_name": "三指针（荷兰国旗）","time_complexity": "O(n)","space_complexity": "O(1)","solution": "三个指针：p0 指向下一个 0 应放的位置，p2 指向下一个 2 应放的位置，curr 遍历。\ncurr 遇到 0：与 p0 交换，p0++, curr++。\ncurr 遇到 2：与 p2 交换，p2--（curr 不动，因为换来的可能是 0）。\ncurr 遇到 1：curr++。","code": "var sortColors = function(nums) {\n    let lo = 0, mid = 0, hi = nums.length - 1;\n    while (mid <= hi) {\n        if (nums[mid] === 0) { [nums[lo], nums[mid]] = [nums[mid], nums[lo]]; lo++; mid++; }\n        else if (nums[mid] === 1) mid++;\n        else { [nums[mid], nums[hi]] = [nums[hi], nums[mid]]; hi--; }\n    }\n};"},{"id": 31,"title": "下一个排列","difficulty": "中等","category": "技巧","tags": "数组 双指针","link": "https://leetcode.cn/problems/next-permutation/","hint": "从右往左找第一个下降的位置 i，再从右往左找第一个大于 nums[i] 的位置 j，交换后翻转 i+1 到末尾。","solution_name": "三步法","time_complexity": "O(n)","space_complexity": "O(1)","solution": "1) 从右往左找第一个 nums[i] < nums[i+1] 的位置 i。\n2) 从右往左找第一个 nums[j] > nums[i] 的位置 j，交换 nums[i] 和 nums[j]。\n3) 翻转 i+1 到末尾（使其变为最小排列）。\n如果步骤 1 找不到（整个数组降序），直接翻转整个数组。","code": "var nextPermutation = function(nums) {\n    let i = nums.length - 2;\n    while (i >= 0 && nums[i] >= nums[i + 1]) i--;\n    if (i >= 0) {\n        let j = nums.length - 1;\n        while (nums[j] <= nums[i]) j--;\n        [nums[i], nums[j]] = [nums[j], nums[i]];\n    }\n    let l = i + 1, r = nums.length - 1;\n    while (l < r) { [nums[l], nums[r]] = [nums[r], nums[l]]; l++; r--; }\n};"},{"id": 287,"title": "寻找重复数","difficulty": "中等","category": "技巧","tags": "双指针 位运算 二分查找","link": "https://leetcode.cn/problems/find-the-duplicate-number/","hint": "Floyd 判圈法：把数组看成链表（nums[i] 指向下一个节点），找环的入口。","solution_name": "Floyd 判圈（快慢指针）","time_complexity": "O(n)","space_complexity": "O(1)","solution": "将数组视为隐式链表：下标 i 的下一个节点是 nums[i]。\n因为有重复数，所以一定有环。用 Floyd 判圈法找环入口即为重复数。\n第一阶段：快慢指针找相遇点。第二阶段：一个从起点，一个从相遇点，同速走到入口。","code": "var findDuplicate = function(nums) {\n    let slow = nums[0], fast = nums[nums[0]];\n    while (slow !== fast) { slow = nums[slow]; fast = nums[nums[fast]]; }\n    slow = 0;\n    while (slow !== fast) { slow = nums[slow]; fast = nums[fast]; }\n    return slow;\n};"}]};

function renderStats() {
  pageTitle.textContent = '刷题统计';
  backBtn.classList.remove('show');
  const pr = loadP(), done = doneCount(), total = PROBLEMS.length, pct = total ? (done/total*100).toFixed(1) : 0;

  let h = `<div class="stats-page fade-up">
    <div class="hero-card" style="margin:0 0 16px">
      <div class="hero-top"><span class="hero-label">总进度</span><span class="hero-pct">${done} / ${total}</span></div>
      <div class="hero-bar"><div class="hero-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="section-label" style="padding-left:0">按难度</div>`;

  [['简单','--green'],['中等','--yellow'],['困难','--red']].forEach(([d,c]) => {
    const ps = PROBLEMS.filter(p=>p.difficulty===d);
    const dn = ps.filter(p=>pr[p.id]).length, tt = ps.length, pp = tt ? (dn/tt*100) : 0;
    h += `<div class="stats-card">
      <div class="stats-row"><span class="stats-label" style="color:var(${c})">${d}</span><span class="stats-value">${dn} / ${tt}</span></div>
      <div class="stats-bar"><div class="stats-bar-fill" style="width:${pp}%;background:var(${c})"></div></div>
    </div>`;
  });

  h += `<div class="section-label" style="padding-left:0;margin-top:4px">按分类</div>`;
  const colors = ['#6366f1','#06b6d4','#a855f7','#f97316','#22c55e','#ec4899'];
  CATEGORIES.forEach((cat, i) => {
    const d = catDone(cat), t = catTotal(cat), p = t ? (d/t*100) : 0;
    const clr = colors[i % colors.length];
    h += `<div class="stats-card">
      <div class="stats-row"><span class="stats-label">${CAT_ICONS[cat]||''} ${cat}</span><span class="stats-value">${d} / ${t}</span></div>
      <div class="stats-bar"><div class="stats-bar-fill" style="width:${p}%;background:${clr}"></div></div>
    </div>`;
  });

  h += `<button class="reset-btn" onclick="resetAll()">重置所有进度</button></div>`;
  app.innerHTML = h;
}

const AK = 'lc100_apikey';
const AI_SVC = 'lc100_ai_service';

let aiProblem = null;

const AI_SERVICES = [

function buildSystemPrompt(p) {
  return `你是一个 LeetCode 算法辅导助手。当前题目是：

题号: ${p.id}
题名: ${p.title}
难度: ${p.difficulty}
分类: ${p.category}
标签: ${p.tags}
链接: ${p.link}

参考解法 (${p.solution_name}):
${p.solution}

参考代码:
${p.code}

时间复杂度: ${p.time_complexity}
空间复杂度: ${p.space_complexity}

请基于以上信息回答用户的问题。请用中文回答，解释要清晰易懂。如果用户问的是思路相关问题，先引导思考再给出答案。代码用 JavaScript。`;
}

function buildUserPrompt(p) {
  return `我正在做 LeetCode #${p.id}「${p.title}」（${p.difficulty} / ${p.category}）

请帮我理解这道题的解题思路，包括：
1. 题目的核心考察点是什么？

function openAI(pid) {

// ── 免费模式：复制 prompt + 跳转 ──

function copyPrompt() {
  const prompt = buildUserPrompt(aiProblem);

    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 复制 Prompt'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    // Fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = prompt; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = $('copyBtn');
    btn.textContent = '✅ 已复制！'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 复制 Prompt'; btn.classList.remove('copied'); }, 2000);
  });
}

function copyAndJump(serviceId) {
  const svc = AI_SERVICES.find(s => s.id === serviceId);
  const prompt = buildUserPrompt(aiProblem);
  navigator.clipboard.writeText(prompt).catch(() => {
    const ta = document.createElement('textarea');

    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  });
  window.open(svc.url, '_blank');
}

// ── API 模式：应用内对话 ──
function openApiChat() {
  const p = aiProblem;
  aiMessages = [
    { role: 'system', content: buildSystemPrompt(p) },
  ];

  const chatHTML = `<div class="ai-chat" id="aiChat">
    <div class="ai-chat-header">
      <button class="ai-back" onclick="closeAI()">‹</button>
      <h2>AI 问答 · #${p.id} ${esc(p.title)}</h2>
      <span class="ai-mode-tag ai-mode-api">API</span>
    </div>
    <div class="ai-messages" id="aiMsgs">
      <div class="ai-msg system">已加载题目上下文，请随意提问</div>
    </div>
    <div class="ai-input-bar">
      <textarea id="aiInput" placeholder="输入你的问题…" rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAI()}"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
      <button class="ai-send-btn" id="aiSendBtn" onclick="sendAI()">↑</button>
    </div>
  </div>`;

  document.body.insertAdjacentHTML('beforeend', chatHTML);
  $('aiInput').focus();
}

async function sendAI() {
  if (aiStreaming) return;
  const input = $('aiInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = ''; input.style.height = 'auto';
  const msgs = $('aiMsgs');

  // Add user message
  aiMessages.push({ role: 'user', content: text });
  msgs.innerHTML += `<div class="ai-msg user">${esc(text)}</div>`;

  // Add typing indicator
  const typingId = 'typing_' + Date.now();
  msgs.innerHTML += `<div class="ai-msg ai" id="${typingId}"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
  msgs.scrollTop = msgs.scrollHeight;

  aiStreaming = true;
  $('aiSendBtn').disabled = true;

  try {
    const apiKey = getApiKey();
    const res = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: aiMessages,
        stream: true,
        max_tokens: 2048,
      }),
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error(`API 请求失败 (${res.status}): ${err}`);
    }

    // Stream response
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let aiText = '';
    const aiEl = $(typingId);

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value, { stream: true });
      const lines = chunk.split('\n').filter(l => l.startsWith('data: '));

      for (const line of lines) {
        const data = line.slice(6);
        if (data === '[DONE]') break;
        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content || '';
          aiText += delta;
          aiEl.textContent = aiText;
          msgs.scrollTop = msgs.scrollHeight;
        } catch {}
      }
    }

    aiMessages.push({ role: 'assistant', content: aiText });

  } catch (err) {
    const aiEl = $(typingId);
    aiEl.innerHTML = `<span style="color:var(--red)">⚠ ${esc(err.message)}</span>`;
  } finally {
    aiStreaming = false;
    $('aiSendBtn').disabled = false;
    $('aiInput')?.focus();
  }
}

function closeAI() {
  const el = $('aiChat');
  if (el) el.remove();
  aiMessages = [];
  aiStreaming = false;
}

const TK = 'lc100_theme';
function initTheme() {
  const saved = localStorage.getItem(TK);
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
  } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
    document.documentElement.setAttribute('data-theme', 'light');
  }
  updateThemeMeta();
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem(TK, next);
  updateThemeMeta();
}
function updateThemeMeta() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  document.querySelector('meta[name="theme-color"]').content = isLight ? '#f5f5f7' : '#0a0a0f';
}
initTheme();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    // 检测到新 SW 时立即激活并刷新
    reg.addEventListener('updatefound', () => {
      const newSW = reg.installing;
      if (newSW) {
        newSW.addEventListener('statechange', () => {
          if (newSW.state === 'activated' && navigator.serviceWorker.controller) {
            window.location.reload();
          }
        });
      }
    });
    // 每次打开页面都检查更新
    reg.update().catch(() => {});
  }).catch(() => {});
}
